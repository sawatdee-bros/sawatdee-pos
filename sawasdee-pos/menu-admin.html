<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品管理 - サワディーブロス</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding-bottom: 40px; }
header { background: #1e293b; padding: 14px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #334155; }
.back-btn { color: #94a3b8; text-decoration: none; font-size: 20px; }
header h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; flex: 1; }

/* フィルター */
.filter-bar { background: #1e293b; border-bottom: 1px solid #334155; padding: 10px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 12px; cursor: pointer; white-space: nowrap; }
.filter-btn.active { background: #166534; border-color: #166534; color: white; }

/* 商品リスト */
.item-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

/* 商品カード */
.item-card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
.item-card.soldout-card { border-color: #ef4444; }
.item-card-main { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; }
.item-card-left { flex: 1; min-width: 0; }
.item-id { font-size: 10px; color: #475569; margin-bottom: 2px; }
.item-name { font-size: 15px; font-weight: 600; color: #f1f5f9; margin-bottom: 2px; }
.item-subcat { font-size: 11px; color: #64748b; }
.item-price { font-size: 14px; font-weight: 600; color: #22c55e; margin-top: 2px; }

/* 売り切れトグル（メイン） */
.soldout-toggle-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
.soldout-label { font-size: 10px; color: #94a3b8; }
.soldout-label.on { color: #ef4444; font-weight: 700; }
.toggle { position: relative; width: 52px; height: 28px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #334155; border-radius: 28px; cursor: pointer; transition: 0.2s; }
.toggle-slider:before { content: ''; position: absolute; width: 22px; height: 22px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
.toggle input:checked + .toggle-slider { background: #ef4444; }
.toggle input:checked + .toggle-slider:before { transform: translateX(24px); }

/* 展開エリア */
.item-detail { display: none; border-top: 1px solid #334155; padding: 14px 16px; }
.item-detail.open { display: block; }
.detail-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.detail-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 120px; }
.detail-field label { font-size: 11px; color: #64748b; }
.detail-field input, .detail-field textarea, .detail-field select { background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; padding: 7px 10px; font-size: 13px; font-family: inherit; }
.detail-field textarea { resize: vertical; min-height: 60px; line-height: 1.4; }
.detail-field input:focus, .detail-field textarea:focus { outline: none; border-color: #166534; }
.detail-flags { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
.flag-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #94a3b8; cursor: pointer; }
.flag-item input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #166534; }
.spicy-select { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #94a3b8; }
.spicy-select select { background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; padding: 4px 8px; font-size: 13px; }
.save-btn { padding: 8px 20px; background: #166534; border: none; border-radius: 8px; color: white; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px; }
.save-btn:hover { background: #15803d; }
.saved-msg { font-size: 12px; color: #22c55e; margin-left: 10px; display: none; }

/* 検索 */
.search-bar { padding: 10px 16px; background: #0f172a; border-bottom: 1px solid #334155; }
.search-input { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; padding: 8px 14px; font-size: 14px; font-family: inherit; }
.search-input:focus { outline: none; border-color: #166534; }

.empty { padding: 40px; text-align: center; color: #475569; }
</style>
</head>
<body>
<header>
  <a class="back-btn" href="#" onclick="window.parent.postMessage({type:'setMode',mode:'all'},'*');return false;">←</a>
  <h1>⚙️ 商品管理</h1>
</header>

<div class="search-bar">
  <input class="search-input" id="search" placeholder="🔍 商品名で検索..." oninput="renderList()">
</div>

<div class="filter-bar" id="filter-bar"></div>

<div class="item-list" id="item-list"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, update, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FC = {
  apiKey: 'AIzaSyBVfIZ_pUXqNAUljPBdsNlmVxkPEjvtUZQ',
  authDomain: 'sawatdee-bros.firebaseapp.com',
  databaseURL: 'https://sawatdee-bros-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId: 'sawatdee-bros',
  storageBucket: 'sawatdee-bros.firebasestorage.app',
  messagingSenderId: '1026345346676',
  appId: '1:1026345346676:web:98478c02d3dfbae3df310e'
};
const app = initializeApp(FC);
const db = getDatabase(app);

let DAY_START = 8;

let ALL_ITEMS = []; // Firebaseから読み込む

// 状態
let soldoutState = {}; // Firebaseから取得
let localEdits = {}; // ローカル編集中のデータ
let currentFilter = 'all';
let openCards = new Set();

// 朝6時に売り切れ自動リセット（Firebaseのタイムスタンプで管理）
  function checkAutoReset(lastResetTs) {
    const now = new Date();
    const todayReset = new Date(now);
    if (now.getHours() < DAY_START) todayReset.setDate(todayReset.getDate() - 1);
    todayReset.setHours(DAY_START, 0, 0, 0);
    if (!lastResetTs || lastResetTs < todayReset.getTime()) {
      set(ref(db, 'soldout'), { _reset_at: Date.now() });
    }
  }

// Firebase: soldout読み込み
let _resetChecked = false;
// 初期化：Firebaseからメニューを読み込む
async function init() {
  // store_configを先に読んでDAY_STARTを確定
  const cfgSnap = await get(ref(db, 'store_config/day_start_hour'));
  if (cfgSnap.val() !== null) DAY_START = cfgSnap.val();

  const menuSnap = await get(ref(db, 'menu'));
  const menuData = menuSnap.val() || {};
  ALL_ITEMS = [];
  var foodSubcats = [];
  var drinkSubcats = [];
  for (const [subcat, items] of Object.entries(menuData.food || {})) {
    foodSubcats.push(subcat);
    items.forEach(function(item) { ALL_ITEMS.push(Object.assign({}, item, {category:'food', subcat:subcat})); });
  }
  for (const [subcat, items] of Object.entries(menuData.drink || {})) {
    drinkSubcats.push(subcat);
    items.forEach(function(item) { ALL_ITEMS.push(Object.assign({}, item, {category:'drink', subcat:subcat})); });
  }
  // フィルターバー生成（ALL_ITEMS読み込み後）
  var FILTERS = [
    { key: 'all', label: 'すべて' },
    { key: 'soldout', label: '🔴 売り切れ中' },
    { key: 'food', label: '🍽 フード' },
    { key: 'drink', label: '🥤 ドリンク' },
  ];
  foodSubcats.forEach(function(s) { FILTERS.push({ key: 'f_'+s, label: s }); });
  drinkSubcats.forEach(function(s) { FILTERS.push({ key: 'd_'+s, label: s }); });
  document.getElementById('filter-bar').innerHTML = FILTERS.map(function(f) {
    return '<button class="filter-btn' + (currentFilter===f.key?' active':'') + '" onclick="setFilter(\'' + f.key + '\')">' + f.label + '</button>';
  }).join('');
  startSoldoutWatch();
}

function startSoldoutWatch() {
  onValue(ref(db, 'soldout'), snap => {
  const data = snap.val() || {};
  if (!_resetChecked) {
    _resetChecked = true;
    checkAutoReset(data._reset_at || null);
  }
  soldoutState = data;
  renderList();
  });
}

init();

window.setFilter = (key) => {
  currentFilter = key;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderList();
};

function getFiltered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  return ALL_ITEMS.filter(item => {
    if (currentFilter === 'soldout' && !soldoutState[item.name]) return false;
    if (currentFilter === 'food' && item.category !== 'food') return false;
    if (currentFilter === 'drink' && item.category !== 'drink') return false;
    if (currentFilter.startsWith('f_') && item.subcat !== currentFilter.slice(2)) return false;
    if (currentFilter.startsWith('d_') && item.subcat !== currentFilter.slice(2)) return false;
    if (q && !item.name.includes(q) && !item.kata.includes(q)) return false;
    return true;
  });
}

window.renderList = function() {
  const items = getFiltered();
  if (items.length === 0) {
    document.getElementById('item-list').innerHTML = '<div class="empty">該当する商品がありません</div>';
    return;
  }
  document.getElementById('item-list').innerHTML = items.map(item => {
    const isSoldout = !!soldoutState[item.name];
    const ed = localEdits[item.id] || item;
    const isOpen = openCards.has(item.id);
    return `<div class="item-card${isSoldout?' soldout-card':''}" id="card-${item.id}">
      <div class="item-card-main" onclick="toggleCard('${item.id}')">
        <div class="item-card-left">
          <div class="item-id">${item.id}</div>
          <div class="item-name">${item.name}</div>
          <div class="item-subcat">${item.category==='food'?'🍽':'🥤'} ${item.subcat}</div>
          <div class="item-price">￥${item.price.toLocaleString()}</div>
        </div>
        <div class="soldout-toggle-wrap" onclick="event.stopPropagation()">
          <div class="soldout-label${isSoldout?' on':''}">売り切れ</div>
          <label class="toggle">
            <input type="checkbox" ${isSoldout?'checked':''} onchange="toggleSoldout('${item.name}', this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="item-detail${isOpen?' open':''}" id="detail-${item.id}">
        <div class="detail-row">
          <div class="detail-field" style="flex:2;min-width:200px">
            <label>商品名（日本語）</label>
            <input type="text" value="${ed.name}" onchange="editField('${item.id}','name',this.value)">
          </div>
          <div class="detail-field">
            <label>税抜価格</label>
            <input type="number" value="${ed.price}" onchange="editField('${item.id}','price',Number(this.value))">
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-field">
            <label>キッチン表示名</label>
            <input type="text" value="${ed.kitchen_name||''}" placeholder="${ed.name}" onchange="editField('${item.id}','kitchen_name',this.value)">
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-field">
            <label>カタカナタイ語</label>
            <input type="text" value="${ed.kata||''}" onchange="editField('${item.id}','kata',this.value)">
          </div>
          <div class="detail-field">
            <label>タイ語</label>
            <input type="text" value="${ed.thai||''}" onchange="editField('${item.id}','thai',this.value)">
          </div>
          <div class="detail-field">
            <label>英語</label>
            <input type="text" value="${ed.en||''}" onchange="editField('${item.id}','en',this.value)">
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-field" style="flex:1;min-width:100%">
            <label>商品説明</label>
            <textarea onchange="editField('${item.id}','desc',this.value)">${ed.desc||''}</textarea>
          </div>
        </div>
        <div class="detail-flags">
          <label class="flag-item">
            <input type="checkbox" ${ed.pakchi?'checked':''} onchange="editField('${item.id}','pakchi',this.checked)">
            🌿 パクチー
          </label>
          <label class="flag-item">
            <input type="checkbox" ${ed.sake?'checked':''} onchange="editField('${item.id}','sake',this.checked)">
            🍺 酒に合う
          </label>
          <div class="spicy-select">
            🌶️ 辛さ:
            <select onchange="editField('${item.id}','spicy',Number(this.value))">
              ${[0,0.5,1,2,3,10].map(v=>`<option value="${v}" ${(ed.spicy||0)===v?'selected':''}>${v===0?'なし':v===10?'激辛':v+'辛'}</option>`).join('')}
            </select>
          </div>
          <div class="spicy-select">
            人気・おすすめ:
            <select onchange="editField('${item.id}','popular',this.value)">
              ${['','人気料理','当店名物','おススメ'].map(v=>`<option value="${v}" ${(ed.popular||'')===v?'selected':''}>${v||'なし'}</option>`).join('')}
            </select>
          </div>
          ${item.category==='drink' ? `<div class="spicy-select">
            🍺 杯数カウント:
            <select onchange="editField('${item.id}','drink_count',Number(this.value))">
              <option value="0" ${(ed.drink_count===0)?'selected':''}>0（カウントしない）</option>
              <option value="1" ${(ed.drink_count===undefined||ed.drink_count===1)?'selected':''}>1（通常）</option>
              <option value="2" ${(ed.drink_count===2)?'selected':''}>2（ボトル等）</option>
              <option value="3" ${(ed.drink_count===3)?'selected':''}>3</option>
            </select>
          </div>` : ''}
        </div>
        <div style="margin-top:10px;margin-bottom:10px;">
          <div style="font-size:11px;color:#64748b;margin-bottom:6px;">注文オプション</div>
          <div id="opt-list-${item.id}">
            ${renderItemOptList(item.id, localEdits[item.id]?.item_options ?? item.item_options)}
          </div>
          <button type="button" onclick="addItemOpt('${item.id}')" style="margin-top:6px;padding:4px 12px;border:1px dashed #475569;border-radius:6px;background:transparent;color:#64748b;font-size:12px;cursor:pointer;">＋ オプション追加</button>
        </div>
        <button class="save-btn" onclick="saveItem('${item.id}')">💾 この商品を保存</button>
        <span class="saved-msg" id="saved-${item.id}">✓ 保存しました</span>
      </div>
    </div>`;
  }).join('');
};

window.toggleCard = (id) => {
  if (openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  renderList();
};

window.toggleSoldout = async (name, checked) => {
  if (checked) soldoutState[name] = true;
  else delete soldoutState[name];
  // 即時Firebase保存
  await set(ref(db, 'soldout'), soldoutState);
  renderList();
};

window.editField = (id, field, value) => {
  const orig = ALL_ITEMS.find(i => i.id === id);
  if (!localEdits[id]) localEdits[id] = {...orig};
  localEdits[id][field] = value;
};

window.saveItem = async (id) => {
  const orig = ALL_ITEMS.find(i => i.id === id);
  const ed = localEdits[id] || {};
  if (Object.keys(ed).length === 0) return;
  // Firebaseのmenu_overridesに保存
  await update(ref(db, 'menu_overrides/' + id), ed);
  const msg = document.getElementById('saved-' + id);
  if (msg) { msg.style.display = 'inline'; setTimeout(() => { msg.style.display = 'none'; }, 2000); }
  // ALL_ITEMSも更新
  Object.assign(orig, ed);
  delete localEdits[id];
  renderList();
};

// オプション表示
function renderItemOptList(id, opts) {
  if (!opts || !opts.length) return '<div style="font-size:11px;color:#475569;">なし</div>';
  return opts.map(function(g, gi) {
    var choicesStr = (g.choices||[]).map(function(c){ return typeof c==='string'?c:c.label+(c.price?'(+¥'+c.price+')':''); }).join('、');
    return '<div style="background:#0f172a;border-radius:6px;padding:8px;margin-bottom:4px;font-size:11px;">'
      + '<div style="display:flex;justify-content:space-between;">'
      + '<span style="color:#94a3b8;">' + (g.type==='required'?'必須':'任意') + ' / ' + (g.label||'') + '</span>'
      + '<button onclick="removeItemOpt(&quot;'+id+'&quot;,'+gi+')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:11px;">✕</button>'
      + '</div>'
      + '<div style="color:#64748b;margin-top:2px;">' + choicesStr + '</div>'
      + '</div>';
  }).join('');
};

window.addItemOpt = function(id) {
  var orig = ALL_ITEMS.find(function(i){ return i.id===id; });
  if (!localEdits[id]) localEdits[id] = Object.assign({}, orig);
  if (!localEdits[id].item_options) localEdits[id].item_options = Array.isArray(orig.item_options) ? JSON.parse(JSON.stringify(orig.item_options)) : [];

  // 既存オプションから候補を収集
  var labelSuggestions = [];
  var choicesSuggestions = [];
  ALL_ITEMS.forEach(function(it) {
    var opts = (localEdits[it.id] && localEdits[it.id].item_options) || it.item_options;
    if (!Array.isArray(opts)) return;
    opts.forEach(function(g) {
      if (g.label && !labelSuggestions.includes(g.label)) labelSuggestions.push(g.label);
      if (g.choices && g.choices.length) {
        var cs = g.choices.map(function(c){ return typeof c==='string'?c:c.label+(c.price?':'+c.price:''); }).join(',');
        if (!choicesSuggestions.includes(cs)) choicesSuggestions.push(cs);
      }
    });
  });

  // モーダル生成
  var existing = document.getElementById('add-item-opt-modal');
  if (existing) existing.remove();
  var modal = document.createElement('div');
  modal.id = 'add-item-opt-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;';

  var labelOpts = labelSuggestions.map(function(l){ return '<option value="'+l+'">'+l+'</option>'; }).join('');
  var choicesOpts = choicesSuggestions.map(function(c){ return '<option value="'+c+'">'+c+'</option>'; }).join('');

  modal.innerHTML = '<div style="background:#1e293b;border-radius:14px;border:1px solid #334155;width:440px;max-width:95vw;padding:20px;">'
    + '<h3 style="font-size:15px;font-weight:700;color:#f1f5f9;margin-bottom:14px;">オプション追加</h3>'
    + '<div style="margin-bottom:10px;">'
    + '<label style="font-size:11px;color:#64748b;display:block;margin-bottom:4px;">種類</label>'
    + '<select id="aio-type" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:7px 10px;font-size:13px;">'
    + '<option value="required">必須選択（飲み方など）</option>'
    + '<option value="optional">任意追加（サイドなど）</option>'
    + '</select></div>'
    + '<div style="margin-bottom:10px;">'
    + '<label style="font-size:11px;color:#64748b;display:block;margin-bottom:4px;">ラベル</label>'
    + (labelSuggestions.length ? '<select id="aio-label-sel" onchange="document.getElementById(&quot;aio-label&quot;).value=this.value" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:7px 10px;font-size:13px;margin-bottom:4px;"><option value="">-- 既存から選択 --</option>'+labelOpts+'</select>' : '')
    + '<input id="aio-label" type="text" placeholder="飲み方を選択してください" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:7px 10px;font-size:13px;"></div>'
    + '<div style="margin-bottom:14px;">'
    + '<label style="font-size:11px;color:#64748b;display:block;margin-bottom:4px;">選択肢（カンマ区切り。価格あり: ライス:300）</label>'
    + (choicesSuggestions.length ? '<select id="aio-choices-sel" onchange="document.getElementById(&quot;aio-choices&quot;).value=this.value" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:7px 10px;font-size:13px;margin-bottom:4px;"><option value="">-- 既存から選択 --</option>'+choicesOpts+'</select>' : '')
    + '<input id="aio-choices" type="text" placeholder="ロック,ソーダ割,水割り" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:7px 10px;font-size:13px;"></div>'
    + '<div style="display:flex;gap:8px;">'
    + '<button onclick="window.confirmAddItemOpt(&quot;'+id+'&quot;)" style="flex:1;padding:9px;background:#166534;border:none;border-radius:8px;color:white;font-size:13px;font-weight:600;cursor:pointer;">追加</button>'
    + '<button onclick="document.getElementById(&quot;add-item-opt-modal&quot;).remove()" style="padding:9px 16px;background:transparent;border:1px solid #334155;border-radius:8px;color:#64748b;font-size:13px;cursor:pointer;">キャンセル</button>'
    + '</div></div>';
  document.body.appendChild(modal);
};

window.confirmAddItemOpt = function(id) {
  var type = document.getElementById('aio-type').value;
  var label = document.getElementById('aio-label').value.trim();
  var choicesStr = document.getElementById('aio-choices').value.trim();
  if (!label || !choicesStr) { alert('ラベルと選択肢を入力してください'); return; }
  var choices = choicesStr.split(',').map(function(c){
    c = c.trim();
    var p = c.split(':');
    return (p.length===2 && !isNaN(p[1])) ? {label:p[0].trim(), price:parseInt(p[1])} : c;
  });
  localEdits[id].item_options.push({type:type, label:label, choices:choices});
  var el = document.getElementById('opt-list-'+id);
  if (el) el.innerHTML = renderItemOptList(id, localEdits[id].item_options);
  document.getElementById('add-item-opt-modal').remove();
};

window.removeItemOpt = function(id, gi) {
  if (!localEdits[id] || !localEdits[id].item_options) return;
  localEdits[id].item_options.splice(gi, 1);
  var el = document.getElementById('opt-list-'+id);
  if (el) el.innerHTML = renderItemOptList(id, localEdits[id].item_options);
};

window.saveAllSoldout = async () => {
  await set(ref(db, 'soldout'), soldoutState);
  alert('売り切れ情報を保存しました');
};
</script>

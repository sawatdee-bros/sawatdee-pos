body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; min-height: 100vh; padding-bottom: 180px; }

.history-icon-btn { flex-shrink: 0; padding: 0 10px; height: 44px; background: transparent; border: none; border-left: 1px solid #e5e7eb; color: #6b7280; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; line-height: 1.2; }
.call-btn { flex-shrink: 0; padding: 0 10px; height: 44px; background: transparent; border: none; border-left: 1px solid #e5e7eb; color: #dc2626; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; line-height: 1.2; }
.bill-btn { flex-shrink: 0; padding: 0 10px; height: 44px; background: transparent; border: none; border-left: 1px solid #e5e7eb; color: #1d4ed8; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; line-height: 1.2; }
.bill-confirm-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 600; display: none; align-items: center; justify-content: center; padding: 20px; }

.bill-confirm-box { background: white; border-radius: 16px; padding: 24px 20px; width: 100%; max-width: 300px; text-align: center; }

.badge-recommend { background: #ede9fe; color: #5b21b6; }

.badge-pakchi { background: #d1fae5; color: #065f46; }
.spicy-icons { display: inline-flex; align-items: center; gap: 1px; }

.menu-card-lang { font-size: 10px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.menu-card-desc { font-size: 11px; color: #6b7280; line-height: 1.4; margin-bottom: 2px; }
.menu-card-price-row { display: flex; align-items: baseline; gap: 6px; margin-top: 2px; }
.menu-card-price { font-size: 15px; font-weight: 700; color: #166534; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.menu-card-price-in { font-size: 10px; color: #9ca3af; }

.add-btn { position: absolute; right: 10px; bottom: 10px; width: 30px; height: 30px; border-radius: 50%; background: #166534; color: white; border: none; font-size: 20px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* カート */
/* オプションモーダル */
.opt-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; }
.opt-modal.open { display: flex; }
.opt-box { background: white; border-radius: 16px; padding: 20px; width: 100%; max-width: 340px; }
.opt-title { font-size: 15px; font-weight: 700; color: #111827; margin-bottom: 4px; }
.opt-subtitle { font-size: 12px; color: #6b7280; margin-bottom: 14px; }
.opt-choice { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; margin-bottom: 8px; cursor: pointer; font-size: 14px; color: #374151; }
.opt-choice.selected { border-color: #166534; background: #f0fdf4; color: #166534; font-weight: 600; }

.opt-choice.selected .opt-choice-radio { border-color: #166534; background: #166534; }
.opt-choice.selected .opt-choice-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: white; display: block; }
.opt-choice-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid #d1d5db; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.opt-choice.selected .opt-choice-check { border-color: #166534; background: #166534; color: white; }
.opt-price { margin-left: auto; font-size: 12px; color: #6b7280; }
.opt-btns { display: flex; gap: 8px; margin-top: 14px; }
.opt-cancel { flex: 1; padding: 12px; background: white; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; color: #6b7280; cursor: pointer; }
.opt-confirm { flex: 2; padding: 12px; background: #166534; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; color: white; cursor: pointer; }
.opt-confirm:disabled { background: #d1d5db; cursor: default; }

.cart-wrap { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 2px solid #e5e7eb; padding: 10px 14px 14px; z-index: 200; }

.qty-num { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }

.history-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: none; align-items: flex-end; justify-content: center; }
.history-modal.open { display: flex; }
.history-box { background: white; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 70vh; overflow-y: auto; }
.history-title { font-size: 16px; font-weight: 700; color: #111827; margin-bottom: 14px; text-align: center; }

.history-close { width: 100%; margin-top: 14px; padding: 12px; background: #f3f4f6; border: none; border-radius: 10px; color: #374151; font-size: 14px; cursor: pointer; font-weight: 600; }
</style>

// 売り切れ
let soldout = {};
onValue(ref(db, 'soldout'), snap => { soldout = snap.val() || {}; renderMenu(); });

// カテゴリ・サブカテゴリ状態
let currentCat = 'drink';
let currentSubcat = 'ビール';
let cart = {};

// カテゴリタブ描画
function renderCatTabs() {
  const tabs = [
    { key: 'drink', label: '🥤 ドリンク' },
    { key: 'food', label: '🍽 フード' }
  ];
  document.getElementById('cat-tabs').innerHTML = tabs.map(t =>
    `<button class="cat-tab${currentCat===t.key?' active':''}" onclick="window.selectCat('${t.key}')">${t.label}</button>`
  ).join('');
}

// サブカテゴリタブ描画
function renderSubcatTabs() {
  const subcats = Object.keys(MENU_DATA[currentCat]);
  if (!currentSubcat || !subcats.includes(currentSubcat)) currentSubcat = subcats[0];
  document.getElementById('subcat-tabs').innerHTML = subcats.map(s =>
    `<button class="subcat-tab${currentSubcat===s?' active':''}" onclick="window.selectSubcat('${s}')">${s}</button>`
  ).join('');
}

// バッジ生成
function makeBadges(item) {
  let html = '';
  if (item.popular) {
    if (item.popular.includes('人気')) html += '<span class="badge badge-popular">🔥 人気</span>';
    else if (item.popular.includes('当店名物')) html += '<span class="badge badge-popular">⭐ 名物</span>';
    else if (item.popular.includes('おス') || item.popular.includes('オス')) html += '<span class="badge badge-recommend">👍 おすすめ</span>';
  }
  if (item.sake) html += '<span class="badge badge-sake">🍺 酒に合う</span>';
  if (item.pakchi) html += '<span class="badge badge-pakchi">🌿 パクチー</span>';
  if (item.spicy > 0) {
    const count = item.spicy >= 10 ? 3 : item.spicy >= 3 ? 3 : item.spicy >= 2 ? 2 : 1;
    html += '<span class="spicy-icons">' + '🌶️'.repeat(count) + '</span>';
  }
  return html ? `<div class="menu-card-badges">${html}</div>` : '';
}

// メニュー描画
function renderMenu() {
  const items = (MENU_DATA[currentCat][currentSubcat] || []).filter(i => i.active);
  const html = items.map((item, idx) => {
    const isSoldout = soldout[item.name] === true;
    const priceEx = item.price;
    const priceIn = taxIn(item.price);
    const cartKey = currentCat + '__' + currentSubcat + '__' + idx;
    const cartQty = cart[cartKey] ? cart[cartKey].qty : 0;
    return `<div class="menu-card${isSoldout?' soldout':''} ${item.img?'has-img':'no-img'}" onclick="window.addToCart('${currentCat}','${currentSubcat}',${idx})">
      ${item.img ? `<img class="menu-card-img" src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.style.display='none'">` : ''}
      <div class="menu-card-body">
        <div class="menu-card-name-row">
          <span class="menu-card-name">${item.name}</span>
          ${makeBadges(item)}
          ${isSoldout ? '<span class="soldout-badge">売り切れ</span>' : ''}
        </div>
        ${(item.kata||item.thai||item.en) ? `<div class="menu-card-lang">${[item.kata,item.thai,item.en].filter(Boolean).join(' / ')}</div>` : ''}
        ${item.desc ? `<div class="menu-card-desc">${item.desc}</div>` : ''}
        ${!isSoldout ? `<div class="menu-card-price-row">
          <span class="menu-card-price">${priceEx===0?'無料':fmtY(priceEx)}</span>
          <span class="menu-card-price-in">税込${fmtY(priceIn)}</span>
        </div>` : ''}
        ${cartQty > 0 ? `<div class="qty-row">
          <button class="qty-btn" onclick="event.stopPropagation();window.changeQty('${cartKey}',-1)">−</button>
          <span class="qty-num">${cartQty}</span>
          <button class="qty-btn" onclick="event.stopPropagation();window.addToCart('${currentCat}','${currentSubcat}',${idx})">+</button>
        </div>` : ''}
      </div>
      ${!isSoldout && cartQty===0 ? '<button class="add-btn" onclick="event.stopPropagation();window.addToCart(\''+currentCat+'\',\''+currentSubcat+'\','+idx+')">+</button>' : ''}
    </div>`;
  }).join('');
  document.getElementById('menu-list').innerHTML = html || '<div style="padding:40px;text-align:center;color:#9ca3af">商品がありません</div>';
}

// カート描画
function renderCart() {
  let totalEx = 0, totalIn = 0, count = 0;
  let previewHTML = '';
  Object.entries(cart).forEach(([key, c]) => {
    const extraPrice = c.extras ? c.extras.reduce((s, e) => s + e.price, 0) : 0;
    const totalPrice = c.item.price + extraPrice;
    totalEx += totalPrice * c.qty;
    totalIn += taxIn(totalPrice) * c.qty;
    count += c.qty;
    const subPrice = fmtY(totalPrice * c.qty);
    previewHTML += `<div class="cart-item-row">
      <button class="cart-item-qty-btn" onclick="window.changeQty('${key}',-1)">−</button>
      <span class="cart-item-qty">${c.qty}</span>
      <button class="cart-item-qty-btn" onclick="window.changeQty('${key}',1)">+</button>
      <span class="cart-item-name">${c.item.name}${c.extras&&c.extras.length?` +${c.extras.map(e=>e.label).join("・")}`:""}</span>
      <span class="cart-item-price">${subPrice}</span>
    </div>`;
  });
  document.getElementById('cart-count').textContent = 'カート: ' + count + '品';
  document.getElementById('cart-total-ex').textContent = fmtY(totalEx);
  document.getElementById('cart-total').textContent = '税込 ' + fmtY(totalIn);
  document.getElementById('cart-preview').innerHTML = previewHTML;
  document.getElementById('order-btn').disabled = count === 0;
  document.getElementById('cancel-btn').disabled = count === 0;
}

// アクション
window.selectCat = (cat) => { currentCat = cat; currentSubcat = null; renderCatTabs(); renderSubcatTabs(); renderMenu(); };
window.selectSubcat = (sub) => { currentSubcat = sub; renderSubcatTabs(); renderMenu(); };
let pendingOpt = null;
let selectedOpt = {};

window.addToCart = (cat, sub, idx) => {
  const item = MENU_DATA[cat][sub][idx];
  if (!item || soldout[item.name]) return;
  // 注意フラグがあれば確認ダイアログ
  if (item.warning) {
    if (!confirm(item.warning)) return;
  }
  const optDef = ITEM_OPTIONS[item.name];
  if (optDef) {
    // オプションモーダルを開く
    pendingOpt = { cat, sub, idx, item, optDef };
    selectedOpt = {};
    document.getElementById('opt-item-name').textContent = item.name;
    document.getElementById('opt-label').textContent = optDef.label;
    const confirmBtn = document.getElementById('opt-confirm');
    confirmBtn.disabled = optDef.type === 'required';
    // 選択肢を描画
    const html = optDef.choices.map((c, i) => {
      const label = typeof c === 'string' ? c : c.label;
      const price = typeof c === 'object' ? c.price : null;
      const isCheck = optDef.type === 'optional';
      return `<div class="opt-choice" id="opt-c-${i}" onclick="window.selectOpt(${i})">
        <span class="${isCheck ? 'opt-choice-check' : 'opt-choice-radio'}"></span>
        <span>${label}</span>
        ${price ? `<span class="opt-price">+￥${price.toLocaleString()}</span>` : ''}
      </div>`;
    }).join('');
    document.getElementById('opt-choices').innerHTML = html;
    document.getElementById('opt-modal').classList.add('open');
    return;
  }
  addItemToCart(cat, sub, idx, item, null, []);
};

window.selectOpt = (i) => {
  const optDef = pendingOpt.optDef;
  if (optDef.type === 'required') {
    // ラジオ
    selectedOpt = { choice: i };
    document.querySelectorAll('.opt-choice').forEach((el, j) => {
      el.classList.toggle('selected', j === i);
    });
    document.getElementById('opt-confirm').disabled = false;
  } else {
    // チェックボックス
    if (selectedOpt[i]) delete selectedOpt[i];
    else selectedOpt[i] = true;
    document.getElementById('opt-c-' + i).classList.toggle('selected', !!selectedOpt[i]);
  }
};

window.confirmOpt = () => {
  if (!pendingOpt) return;
  const { cat, sub, idx, item, optDef } = pendingOpt;
  let optLabel = '';
  let extraPrice = 0;
  const extras = [];
  if (optDef.type === 'required') {
    optLabel = optDef.choices[selectedOpt.choice];
  } else {
    optDef.choices.forEach((c, i) => {
      if (selectedOpt[i]) {
        extras.push({ label: c.label, price: c.price });
        extraPrice += c.price;
      }
    });
  }
  addItemToCart(cat, sub, idx, item, optLabel, extras);
  closeOpt();
};

window.closeOpt = () => {
  document.getElementById('opt-modal').classList.remove('open');
  pendingOpt = null;
};

function addItemToCart(cat, sub, idx, item, optLabel, extras) {
  const optKey = optLabel || extras.map(e => e.label).join(',');
  const key = cat + '__' + sub + '__' + idx + (optKey ? '__' + optKey : '');
  const displayName = item.name + (optLabel ? '（' + optLabel + '）' : '');
  if (!cart[key]) cart[key] = { item: { name: displayName, price: item.price }, qty: 0, extras: extras };
  cart[key].qty++;
  renderMenu(); renderCart();
}
window.changeQty = (key, delta) => {
  if (delta > 0) {
    if (!cart[key]) return;
    cart[key].qty += 1;
  } else {
    if (!cart[key]) return;
    cart[key].qty -= 1;
    if (cart[key].qty <= 0) delete cart[key];
  }
  renderMenu(); renderCart();
};

window.callStaff = async function() {
  const btn = document.getElementById('call-btn');
  const tableNum = new URLSearchParams(location.search).get('table') || '?';
  if (btn.classList.contains('calling')) {
    await remove(ref(db, 'calls/' + tableNum));
    btn.classList.remove('calling');
    btn.innerHTML = '🔔<span>店員を呼ぶ</span>';
  } else {
    await set(ref(db, 'calls/' + tableNum), { table: tableNum, timestamp: Date.now() });
    btn.classList.add('calling');
    btn.innerHTML = '🔔<span>呼出中<span class="call-dot">.</span><span class="call-dot">.</span><span class="call-dot">.</span></span>';
    setTimeout(async function() {
      await remove(ref(db, 'calls/' + tableNum));
      btn.classList.remove('calling');
      btn.innerHTML = '🔔<span>店員を呼ぶ</span>';
    }, 3 * 60 * 1000);
  }
};

window.showHistory = async function() {
  const { get, child } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js').catch(()=>({}));
  // Firebaseから当日の注文を取得してテーブル番号でフィルタ
  const snap = await new Promise(resolve => {
    onValue(ref(db, 'orders'), resolve, { onlyOnce: true });
  });
  const data = snap.val() || {};
  const todayStart = (() => {
    const now = new Date(), s = new Date(now);
    if (now.getHours() < 6) s.setDate(s.getDate() - 1);
    s.setHours(6, 0, 0, 0);
    return s.getTime();
  })();

  // 自分のテーブルの注文を集計（会計済み除外・当日のみ）
  const itemMap = {};
  Object.values(data).forEach(order => {
    if (order.table != tableNum) return;
    if ((order.timestamp || 0) < todayStart) return;
    if (order.status === 'paid') return; // 会計済みは除外
    (order.items || []).forEach(item => {
      const key = item.name;
      if (!itemMap[key]) itemMap[key] = { name: item.name, qty: 0 };
      itemMap[key].qty += item.qty;
    });
  });

  const items = Object.values(itemMap);
  const list = document.getElementById('history-list');
  if (items.length === 0) {
    list.innerHTML = '<div class="history-empty">まだ注文履歴がありません</div>';
  } else {
    list.innerHTML = items.map(it =>
      `<div class="history-item"><span>${it.name}</span><span class="history-qty">×${it.qty}</span></div>`
    ).join('');
  }
  document.getElementById('history-modal').classList.add('open');
};

window.closeHistory = function() {
  document.getElementById('history-modal').classList.remove('open');
};
window.cancelOrder = () => { cart = {}; renderMenu(); renderCart(); };
window.placeOrder = async () => {
  const items = [];
  Object.values(cart).forEach(c => {
    const item = { name: c.item.name, qty: c.qty, price: c.item.price };
    if (c.extras && c.extras.length > 0) {
      item.extrasStr = c.extras.map(e => e.label).join('・');
      item.price = c.item.price + c.extras.reduce((s, e) => s + e.price, 0);
    }
    items.push(item);
  });
  if (items.length === 0) return;
  const total = items.reduce((s, i) => s + taxIn(i.price) * i.qty, 0);
  document.getElementById('order-btn').disabled = true;
  document.getElementById('order-btn').textContent = '送信中...';
  await push(ref(db, 'orders'), { table: tableNum, items, total, status: 'new', timestamp: Date.now() });
  cart = {};
  renderMenu(); renderCart();
  document.getElementById('order-btn').textContent = '✓ 注文しました！';
  setTimeout(() => { document.getElementById('order-btn').textContent = '注文する'; }, 2000);
};

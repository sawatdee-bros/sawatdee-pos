<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店舗設定 - サワディーブロス</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding-bottom: 60px; }

header { background: #1e293b; padding: 14px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
.back-btn { color: #94a3b8; text-decoration: none; font-size: 20px; line-height: 1; }
header h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; flex: 1; }
.save-all-btn { padding: 8px 18px; background: #166534; border: none; border-radius: 8px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
.save-all-btn:disabled { background: #334155; color: #64748b; cursor: default; }

.loading { text-align: center; padding: 60px; color: #64748b; }
.saved-toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #166534; color: white; padding: 10px 24px; border-radius: 20px; font-size: 14px; font-weight: 600; display: none; z-index: 200; white-space: nowrap; }
.saved-toast.show { display: block; }

.section { margin: 20px 16px 0; }
.section-title { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }

.card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
.field-row { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #1e293b; gap: 12px; }
.field-row:last-child { border-bottom: none; }
.field-row + .field-row { border-top: 1px solid #334155; }
.field-label { flex: 1; }
.field-label-main { font-size: 14px; color: #f1f5f9; font-weight: 500; }
.field-label-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
.field-input { background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; padding: 8px 12px; font-size: 14px; font-family: inherit; width: 120px; text-align: right; }
.field-input:focus { outline: none; border-color: #166534; }
.field-input.wide { width: 200px; text-align: left; }
.field-unit { font-size: 13px; color: #64748b; white-space: nowrap; }

/* トグルスイッチ */
.toggle { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #334155; border-radius: 26px; cursor: pointer; transition: 0.2s; }
.toggle-slider:before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
.toggle input:checked + .toggle-slider { background: #166534; }
.toggle input:checked + .toggle-slider:before { transform: translateX(22px); }

/* 時刻セレクト */
.hour-select { background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; padding: 8px 12px; font-size: 14px; font-family: inherit; cursor: pointer; }
.hour-select:focus { outline: none; border-color: #166534; }
</style>
</head>
<body>

<header>
  <a class="back-btn" href="kitchen.html">←</a>
  <h1>🏪 店舗設定</h1>
  <button class="save-all-btn" id="save-btn" onclick="saveAll()">保存する</button>
</header>

<div class="saved-toast" id="toast">✓ 保存しました</div>
<div class="loading" id="loading">読み込み中...</div>
<div id="main" style="display:none">

  <div class="section">
    <div class="section-title">基本情報</div>
    <div class="card">
      <div class="field-row">
        <div class="field-label">
          <div class="field-label-main">店舗名</div>
        </div>
        <input class="field-input wide" type="text" id="store_name">
      </div>
      <div class="field-row">
        <div class="field-label">
          <div class="field-label-main">消費税率</div>
        </div>
        <input class="field-input" type="number" id="tax_rate" step="0.01" min="0" max="1">
        <span class="field-unit">（例: 0.1 = 10%）</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">席・テーブル</div>
    <div class="card">
      <div class="field-row">
        <div class="field-label">
          <div class="field-label-main">テーブル数</div>
          <div class="field-label-sub">通常席</div>
        </div>
        <input class="field-input" type="number" id="table_count" min="1" max="50">
        <span class="field-unit">卓</span>
      </div>
      <div class="field-row">
        <div class="field-label">
          <div class="field-label-main">飲み放題テーブル数</div>
          <div class="field-label-sub">飲み放題QR用</div>
        </div>
        <input class="field-input" type="number" id="nomi_table_count" min="0" max="50">
        <span class="field-unit">卓</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">チャージ料</div>
    <div class="card">
      <div class="field-row">
        <div class="field-label">
          <div class="field-label-main">チャージ料（1名あたり）</div>
        </div>
        <input class="field-input" type="number" id="charge_per_person" min="0">
        <span class="field-unit">円</span>
      </div>
      <div class="field-row">
        <div class="field-label">
          <div class="field-label-main">チャージ免除ドリンク数</div>
          <div class="field-label-sub">1名あたり〇杯以上でチャージ免除</div>
        </div>
        <input class="field-input" type="number" id="charge_free_drink_count" min="0">
        <span class="field-unit">杯</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">営業設定</div>
    <div class="card">
      <div class="field-row">
        <div class="field-label">
          <div class="field-label-main">営業日の切り替え時刻</div>
          <div class="field-label-sub">この時刻に日付が切り替わる（売上・伝票）</div>
        </div>
        <select class="hour-select" id="day_start_hour">
          <!-- JSで生成 -->
        </select>
        <span class="field-unit">時</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">機能ON/OFF</div>
    <div class="card">
      <div class="field-row">
        <div class="field-label">
          <div class="field-label-main">お冷ボタン</div>
          <div class="field-label-sub">客席からお冷注文を受け付ける</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="has_ohiya">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="field-row">
        <div class="field-label">
          <div class="field-label-main">飲み放題機能</div>
          <div class="field-label-sub">飲み放題QRコード・注文ページを使う</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="has_nomi_hodai">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="field-row">
        <div class="field-label">
          <div class="field-label-main">呼び出しボタン</div>
          <div class="field-label-sub">客席から店員呼び出しを受け付ける</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="has_call_button">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, get, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FC = {
  apiKey: 'AIzaSyBVfIZ_pUXqNAUljPBdsNlmVxkPEjvtUZQ',
  authDomain: 'sawatdee-bros.firebaseapp.com',
  databaseURL: 'https://sawatdee-bros-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId: 'sawatdee-bros',
  storageBucket: 'sawatdee-bros.firebasestorage.app',
  messagingSenderId: '1026345346676',
  appId: '1:1026345346676:web:98478c02d3dfbae3df310e'
};
const app = initializeApp(FC);
const db = getDatabase(app);

// 時刻セレクトを生成
var sel = document.getElementById('day_start_hour');
for (var h = 0; h < 24; h++) {
  var opt = document.createElement('option');
  opt.value = h;
  opt.textContent = h + '時';
  sel.appendChild(opt);
}

// デフォルト値
var DEFAULTS = {
  store_name: '',
  tax_rate: 0.1,
  charge_per_person: 250,
  charge_free_drink_count: 2,
  table_count: 10,
  nomi_table_count: 5,
  has_ohiya: true,
  has_nomi_hodai: true,
  has_call_button: false,
  day_start_hour: 8
};

// Firebase読み込み
get(ref(db, 'store_config')).then(function(snap) {
  var cfg = Object.assign({}, DEFAULTS, snap.val() || {});
  document.getElementById('store_name').value = cfg.store_name || '';
  document.getElementById('tax_rate').value = cfg.tax_rate;
  document.getElementById('charge_per_person').value = cfg.charge_per_person;
  document.getElementById('charge_free_drink_count').value = cfg.charge_free_drink_count;
  document.getElementById('table_count').value = cfg.table_count;
  document.getElementById('nomi_table_count').value = cfg.nomi_table_count;
  document.getElementById('has_ohiya').checked = !!cfg.has_ohiya;
  document.getElementById('has_nomi_hodai').checked = !!cfg.has_nomi_hodai;
  document.getElementById('has_call_button').checked = !!cfg.has_call_button;
  document.getElementById('day_start_hour').value = cfg.day_start_hour !== undefined ? cfg.day_start_hour : 8;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}).catch(function(e) {
  document.getElementById('loading').textContent = '読み込みに失敗しました: ' + e.message;
});

window.saveAll = async function() {
  var btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  var cfg = {
    store_name: document.getElementById('store_name').value,
    tax_rate: parseFloat(document.getElementById('tax_rate').value) || 0.1,
    charge_per_person: parseInt(document.getElementById('charge_per_person').value) || 0,
    charge_free_drink_count: parseInt(document.getElementById('charge_free_drink_count').value) || 0,
    table_count: parseInt(document.getElementById('table_count').value) || 1,
    nomi_table_count: parseInt(document.getElementById('nomi_table_count').value) || 0,
    has_ohiya: document.getElementById('has_ohiya').checked,
    has_nomi_hodai: document.getElementById('has_nomi_hodai').checked,
    has_call_button: document.getElementById('has_call_button').checked,
    day_start_hour: parseInt(document.getElementById('day_start_hour').value)
  };
  try {
    await set(ref(db, 'store_config'), cfg);
    var toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 2000);
  } catch(e) {
    alert('保存に失敗しました: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '保存する';
};
</script>
</body>
</html>

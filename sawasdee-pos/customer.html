<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご注文 - サワディーブロス</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; min-height: 100vh; padding-bottom: 180px; }
header { background: #1a1a2e; color: white; padding: 12px 16px; text-align: center; }
header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; }
header .table-no { font-size: 22px; font-weight: 700; color: #fbbf24; }

/* タブ */
.cat-tabs { display: flex; flex-direction: column; background: #fff; border-bottom: 2px solid #e5e7eb; position: sticky; top: 0; z-index: 100; }
.cat-tabs-action-row { display: flex; justify-content: flex-end; border-bottom: 1px solid #e5e7eb; }
.cat-tabs-scroll { display: flex; flex: 1; overflow-x: auto; }
.history-icon-btn { flex-shrink: 0; padding: 0 10px; height: 40px; background: transparent; border: none; border-left: 1px solid #e5e7eb; color: #6b7280; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; line-height: 1.2; }
.call-btn { flex-shrink: 0; padding: 0 10px; height: 40px; background: transparent; border: none; border-left: 1px solid #e5e7eb; color: #dc2626; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; line-height: 1.2; }
.bill-btn { flex-shrink: 0; padding: 0 10px; height: 40px; background: transparent; border: none; border-left: 1px solid #e5e7eb; color: #1d4ed8; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; line-height: 1.2; }
.bill-confirm-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 600; display: none; align-items: center; justify-content: center; padding: 20px; }
.bill-confirm-modal.open { display: flex; }
.bill-confirm-box { background: white; border-radius: 16px; padding: 24px 20px; width: 100%; max-width: 300px; text-align: center; }
.bill-confirm-title { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 8px; }
.bill-confirm-sub { font-size: 13px; color: #6b7280; margin-bottom: 20px; line-height: 1.6; }
.bill-confirm-btns { display: flex; gap: 10px; }
.bill-cancel-btn { flex: 1; padding: 12px; background: #f3f4f6; border: none; border-radius: 10px; color: #374151; font-size: 14px; font-weight: 600; cursor: pointer; }
.bill-ok-btn { flex: 2; padding: 12px; background: #1d4ed8; border: none; border-radius: 10px; color: white; font-size: 14px; font-weight: 700; cursor: pointer; }
.call-btn.calling { color: #dc2626; }
.call-dot { display: inline-block; opacity: 0.2; animation: dotFade 1.2s infinite; }
.call-dot:nth-child(1) { animation-delay: 0s; }
.call-dot:nth-child(2) { animation-delay: 0.4s; }
.call-dot:nth-child(3) { animation-delay: 0.8s; }
@keyframes dotFade { 0%,100%{opacity:0.2} 30%{opacity:1} }
.cat-tab { flex-shrink: 0; padding: 10px 14px; font-size: 13px; font-weight: 600; color: #6b7280; border-bottom: 3px solid transparent; cursor: pointer; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; }
.cat-tab.active { color: #166534; border-bottom-color: #166534; }
.subcat-tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; background: #f0fdf4; border-bottom: 1px solid #e5e7eb; position: sticky; top: 84px; z-index: 99; }
.subcat-tab { flex-shrink: 0; padding: 4px 12px; font-size: 12px; border-radius: 20px; border: 1px solid #d1d5db; background: white; color: #6b7280; cursor: pointer; white-space: nowrap; }
.subcat-tab.active { background: #166534; border-color: #166534; color: white; }

/* メニューカード */
.menu-list { padding: 8px 12px; display: flex; flex-direction: column; gap: 0; }
.menu-card { background: white; border-radius: 10px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; padding: 8px 10px; border: 1px solid #e5e7eb; position: relative; cursor: pointer; }
.menu-card:active { background: #f0fdf4; }
.menu-card.soldout { opacity: 0.45; pointer-events: none; }
.menu-card-img { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.menu-card.no-img { padding: 6px 10px; }
.menu-card-body { flex: 1; min-width: 0; }
.menu-card-name-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 2px; }
.menu-card-name { font-size: 14px; font-weight: 700; color: #111827; }
.menu-card-badges { display: flex; flex-wrap: wrap; gap: 3px; }
.badge { display: inline-flex; align-items: center; gap: 2px; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }
.badge-popular { background: #fef3c7; color: #92400e; }
.badge-recommend { background: #ede9fe; color: #5b21b6; }
.badge-sake { background: #dbeafe; color: #1e40af; }
.badge-pakchi { background: #d1fae5; color: #065f46; }
.spicy-icons { display: inline-flex; align-items: center; gap: 1px; font-size: 11px; }
.chili { font-size: 11px; }
.menu-card-lang { font-size: 10px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.menu-card-desc { font-size: 11px; color: #6b7280; line-height: 1.4; margin-bottom: 2px; }
.menu-card-price-row { display: flex; align-items: baseline; gap: 6px; margin-top: 2px; }
.menu-card-price { font-size: 15px; font-weight: 700; color: #166534; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.menu-card-price-in { font-size: 10px; color: #9ca3af; }
.soldout-badge { display: inline-block; background: #fee2e2; color: #dc2626; font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 10px; margin-top: 2px; }
.add-btn { position: absolute; right: 10px; bottom: 10px; width: 30px; height: 30px; border-radius: 50%; background: #166534; color: white; border: none; font-size: 20px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* カート */
/* オプションモーダル */
.opt-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; }
.opt-modal.open { display: flex; }
.opt-box { background: white; border-radius: 16px; padding: 20px; width: 100%; max-width: 340px; }
.opt-title { font-size: 15px; font-weight: 700; color: #111827; margin-bottom: 4px; }
.opt-subtitle { font-size: 12px; color: #6b7280; margin-bottom: 14px; }
.opt-choice { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; margin-bottom: 8px; cursor: pointer; font-size: 14px; color: #374151; }
.opt-choice.selected { border-color: #166534; background: #f0fdf4; color: #166534; font-weight: 600; }
.opt-choice-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #d1d5db; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.opt-choice.selected .opt-choice-radio { border-color: #166534; background: #166534; }
.opt-choice.selected .opt-choice-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: white; display: block; }
.opt-choice-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid #d1d5db; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.opt-choice.selected .opt-choice-check { border-color: #166534; background: #166534; color: white; }
.opt-price { margin-left: auto; font-size: 12px; color: #6b7280; }
.opt-btns { display: flex; gap: 8px; margin-top: 14px; }
.opt-cancel { flex: 1; padding: 12px; background: white; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; color: #6b7280; cursor: pointer; }
.opt-confirm { flex: 2; padding: 12px; background: #166534; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; color: white; cursor: pointer; }
.opt-confirm:disabled { background: #d1d5db; cursor: default; }

.cart-wrap { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 2px solid #e5e7eb; padding: 10px 14px 14px; z-index: 200; }
.cart-summary { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
.cart-count { font-size: 13px; color: #6b7280; }
.cart-total-ex { font-size: 22px; font-weight: 700; color: #166534; }
.cart-total-amount { font-size: 12px; color: #9ca3af; }
.cart-items-preview { font-size: 12px; color: #374151; margin-bottom: 6px; max-height: 90px; overflow-y: auto; }
.cart-item-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; border-bottom: 1px solid #f3f4f6; }
.cart-item-row:last-child { border-bottom: none; }
.cart-item-name { flex: 1; font-size: 12px; color: #374151; }
.cart-item-qty-btn { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #d1d5db; background: #f9fafb; color: #374151; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; }
.cart-item-qty { font-size: 12px; font-weight: 600; min-width: 18px; text-align: center; }
.cart-item-price { font-size: 11px; color: #6b7280; white-space: nowrap; }
.btn-row { display: flex; gap: 8px; }
.cancel-btn { padding: 12px 16px; background: white; color: #ef4444; border: 1px solid #ef4444; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.cancel-btn:disabled { color: #d1d5db; border-color: #d1d5db; cursor: default; }
.order-btn { flex: 1; padding: 14px; background: #166534; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
.order-btn:disabled { background: #d1d5db; color: #9ca3af; cursor: default; }
.qty-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.qty-btn { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #d1d5db; background: #f9fafb; color: #374151; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.qty-num { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }

.history-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: none; align-items: flex-end; justify-content: center; }
.history-modal.open { display: flex; }
.history-box { background: white; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 70vh; overflow-y: auto; }
.history-title { font-size: 16px; font-weight: 700; color: #111827; margin-bottom: 14px; text-align: center; }
.history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; color: #374151; }
.history-item:last-child { border-bottom: none; }
.history-qty { color: #6b7280; font-size: 13px; }
.history-empty { text-align: center; color: #9ca3af; padding: 30px 0; font-size: 14px; }
.history-close { width: 100%; margin-top: 14px; padding: 12px; background: #f3f4f6; border: none; border-radius: 10px; color: #374151; font-size: 14px; cursor: pointer; font-weight: 600; }
.history-price { color: #166534; font-size: 13px; font-weight: 600; white-space: nowrap; }
.history-divider { border: none; border-top: 1px solid #e5e7eb; margin: 8px 0; }
.history-total-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 4px; font-size: 15px; font-weight: 700; color: #111827; }
.history-charge-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 13px; color: #6b7280; }
.history-pax-row { display: flex; align-items: center; gap: 8px; padding: 10px 0 6px; border-bottom: 1px solid #e5e7eb; margin-bottom: 6px; }
.history-pax-label { font-size: 13px; color: #374151; flex: 1; }
.history-pax-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #d1d5db; background: #f9fafb; color: #374151; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.history-pax-num { font-size: 15px; font-weight: 700; min-width: 24px; text-align: center; color: #111827; }
</style>
</head>
<body>
<header>
  <div class="table-no" id="table-no">テーブル ?</div>
  <h1>SAWATDEE BROS ご注文</h1>
</header>
<div class="cat-tabs"><div class="cat-tabs-action-row"><button class="history-icon-btn" onclick="window.showHistory()">📋<span>注文履歴</span></button><button class="call-btn" id="call-btn" onclick="window.callStaff()">🔔<span>店員を呼ぶ</span></button><button class="bill-btn" onclick="window.requestBill()">💳<span>会計する</span></button></div><div class="cat-tabs-scroll" id="cat-tabs"></div></div>
<div class="subcat-tabs" id="subcat-tabs"></div>
<div class="menu-list" id="menu-list"></div>
<!-- オプションモーダル -->
<div class="opt-modal" id="opt-modal">
  <div class="opt-box">
    <div class="opt-title" id="opt-item-name"></div>
    <div class="opt-subtitle" id="opt-label"></div>
    <div id="opt-choices"></div>
    <div class="opt-btns">
      <button class="opt-cancel" onclick="window.closeOpt()">キャンセル</button>
      <button class="opt-confirm" id="opt-confirm" onclick="window.confirmOpt()">カートに追加</button>
    </div>
  </div>
</div>

<div class="cart-wrap">
  <div class="cart-items-preview" id="cart-preview"></div>
  <div class="cart-summary">
    <div class="cart-count" id="cart-count">カート: 0品</div>
    <div style="display:flex;align-items:baseline;gap:6px">
      <div class="cart-total-ex" id="cart-total-ex">¥0</div>
      <div class="cart-total-amount" id="cart-total">税込 ¥0</div>
    </div>
  </div>
  <div class="btn-row">
    <button class="cancel-btn" id="cancel-btn" onclick="window.cancelOrder()" disabled>✕ キャンセル</button>
    <button class="order-btn" id="order-btn" onclick="window.placeOrder()" disabled>注文する</button>
  </div>
</div>


<!-- 注文履歴モーダル -->
<div class="bill-confirm-modal" id="bill-confirm-modal">
  <div class="bill-confirm-box">
    <div class="bill-confirm-title">💳 お会計</div>
    <div class="bill-confirm-sub">お会計でよろしいですか？<br>伝票をお持ちします。</div>
    <div class="bill-confirm-btns">
      <button class="bill-cancel-btn" onclick="window.closeBillConfirm()">キャンセル</button>
      <button class="bill-ok-btn" onclick="window.confirmBill()">お会計</button>
    </div>
  </div>
</div>

<div class="history-modal" id="history-modal">
  <div class="history-box">
    <div class="history-title">📋 注文履歴</div>
    <div id="history-list"></div>
    <button class="history-close" onclick="window.closeHistory()">閉じる</button>
  </div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, set, remove, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FC = {
  apiKey: 'AIzaSyBVfIZ_pUXqNAUljPBdsNlmVxkPEjvtUZQ',
  authDomain: 'sawatdee-bros.firebaseapp.com',
  databaseURL: 'https://sawatdee-bros-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId: 'sawatdee-bros',
  storageBucket: 'sawatdee-bros.firebasestorage.app',
  messagingSenderId: '1026345346676',
  appId: '1:1026345346676:web:98478c02d3dfbae3df310e'
};
const app = initializeApp(FC);
const db = getDatabase(app);

const TAX = 0.1;

// ---- 状態変数 ----
let MENU_DATA = {};
let hasOhiya = false; // store_config/has_ohiya
let showSetOnCustomer = false; // store_config/show_set_on_customer

// オプション定義
const ITEM_OPTIONS = {
  '泡盛(久米仙)': {
    type: 'required', label: '飲み方を選択してください',
    choices: ['ロック', 'ソーダ割', '水割り']
  },
  'ジャスミン焼酎(茉莉花)': {
    type: 'required', label: '飲み方を選択してください',
    choices: ['ロック', 'ソーダ割', '水割り', 'ジャスミン茶割']
  },
  '梅酒': {
    type: 'required', label: '飲み方を選択してください',
    choices: ['ロック', 'ソーダ割', '水割り']
  },
  '鶏もも肉のガパオ炒め': {
    type: 'optional', label: 'サイドメニューを追加しますか？',
    choices: [
      { label: 'ライス', price: 300 },
      { label: '目玉焼き', price: 120 }
    ]
  }
};
const taxIn = p => Math.floor(p * (1 + TAX));
const fmtY = p => '\uffe5' + p.toLocaleString();

let soldout = {};
let currentCat = 'drink';
let currentSubcat = null;
let cart = {};

// テーブル番号
const params = new URLSearchParams(window.location.search);
const tableNum = params.get('table') || '?';
document.getElementById('table-no').textContent = 'テーブル ' + tableNum;


// ---- 初期化：Firebaseからメニューと売り切れを読み込む ----
async function init() {
  try {
    const menuSnap = await get(ref(db, 'menu'));
    MENU_DATA = menuSnap.val() || {};
    // 店舗設定：お冷ON/OFF
    const ohiyaSnap = await get(ref(db, 'store_config/has_ohiya'));
    hasOhiya = ohiyaSnap.val() === true;
    // 店舗設定：セットメニュー客席表示ON/OFF
    const setSnap = await get(ref(db, 'store_config/show_set_on_customer'));
    showSetOnCustomer = setSnap.val() === true;
    if (Object.keys(MENU_DATA).length === 0) {
      document.getElementById('menu-list').innerHTML = '<div style="padding:40px;text-align:center;color:#9ca3af">メニューを読み込めませんでした</div>';
      return;
    }
    // 売り切れをリアルタイム監視
    onValue(ref(db, 'soldout'), function(snap) { soldout = snap.val() || {}; renderMenu(); });
    renderCatTabs();
    renderSubcatTabs();
    renderMenu();
    renderCart();
  } catch(e) {
    document.getElementById('menu-list').innerHTML = '<div style="padding:40px;text-align:center;color:#9ca3af">読み込みに失敗しました。再読み込みしてください。</div>';
    console.error(e);
  }
}

// カテゴリタブ描画
function renderCatTabs() {
  const tabs = [
    { key: 'drink', label: '🥤 ドリンク' },
    { key: 'food', label: '🍽 フード' }
  ];
  if (showSetOnCustomer && MENU_DATA['set'] && Object.keys(MENU_DATA['set']).length > 0) {
    tabs.push({ key: 'set', label: '🎁 セット' });
  }
  document.getElementById('cat-tabs').innerHTML = tabs.map(function(t) {
    return '<button class="cat-tab' + (currentCat === t.key ? ' active' : '') + '" onclick="window.selectCat(\'' + t.key + '\')">' + t.label + '</button>';
  }).join('');
}

// サブカテゴリタブ描画
function renderSubcatTabs() {
  const order = (MENU_DATA['subcatOrder'] || {})[currentCat] || [];
  const all = Object.keys(MENU_DATA[currentCat] || {});
  // _orderにある順番で並べ、残りは後ろに追加
  const subcats = order.filter(function(s) { return all.includes(s); })
    .concat(all.filter(function(s) { return !order.includes(s); }));
  if (!currentSubcat || !subcats.includes(currentSubcat)) currentSubcat = subcats[0];
  document.getElementById('subcat-tabs').innerHTML = subcats.map(function(s) {
    return '<button class="subcat-tab' + (currentSubcat === s ? ' active' : '') + '" onclick="window.selectSubcat(\'' + s + '\')">' + s + '</button>';
  }).join('');
}

// バッジ生成
function makeBadges(item) {
  var html = '';
  if (item.popular) {
    var icon = item.popular.includes('人気') ? '🔥' : item.popular.includes('名物') ? '⭐' : '👍';
    var cls = (item.popular.includes('おス') || item.popular.includes('オス')) ? 'badge-recommend' : 'badge-popular';
    html += '<span class="badge ' + cls + '">' + icon + ' ' + item.popular + '</span>';
  }
  if (item.sake) html += '<span class="badge badge-sake">🍺 酒に合う</span>';
  if (item.pakchi) html += '<span class="badge badge-pakchi">🌿 パクチー</span>';
  if (item.spicy > 0) {
    var count = Math.min(item.spicy, 10);
    var chilies = '';
    for (var i = 0; i < count; i++) chilies += '🌶️';
    html += '<span class="spicy-icons">' + chilies + '</span>';
  }
  return html ? '<div class="menu-card-badges">' + html + '</div>' : '';
}

// メニュー描画
function renderMenu() {
  var items = ((MENU_DATA[currentCat] || {})[currentSubcat] || []).filter(function(i) { return i.active; });
  var html = items.map(function(item, idx) {
    var isSoldout = soldout[item.name] === true;
    var priceEx = item.price;
    var priceIn = taxIn(item.price);
    var cartKey = currentCat + '__' + currentSubcat + '__' + idx;
    var cartQty = cart[cartKey] ? cart[cartKey].qty : 0;
    var qtyRow = cartQty > 0
      ? '<div class="qty-row"><button class="qty-btn" onclick="event.stopPropagation();window.changeQty(\'' + cartKey + '\',-1)">−</button><span class="qty-num">' + cartQty + '</span><button class="qty-btn" onclick="event.stopPropagation();window.addToCart(\'' + currentCat + '\',\'' + currentSubcat + '\',' + idx + ')">+</button></div>'
      : '';
    var addBtn = (!isSoldout && cartQty === 0)
      ? '<button class="add-btn" onclick="event.stopPropagation();window.addToCart(\'' + currentCat + '\',\'' + currentSubcat + '\',' + idx + ')">+</button>'
      : '';
    return '<div class="menu-card' + (isSoldout ? ' soldout' : '') + ' ' + (item.img ? 'has-img' : 'no-img') + '" onclick="window.addToCart(\'' + currentCat + '\',\'' + currentSubcat + '\',' + idx + ')">'
      + (item.img ? '<img class="menu-card-img" src="' + item.img + '" alt="' + item.name + '" loading="lazy" onerror="this.style.display=\'none\'">' : '')
      + '<div class="menu-card-body">'
      + '<div class="menu-card-name-row"><span class="menu-card-name">' + item.name + '</span>' + makeBadges(item) + (isSoldout ? '<span class="soldout-badge">売り切れ</span>' : '') + '</div>'
      + ([item.kana, item.thai, item.en].filter(Boolean).length ? '<div class="menu-card-lang">' + [item.kana, item.thai, item.en].filter(Boolean).join(' / ') + '</div>' : '')
      + (item.desc ? '<div class="menu-card-desc">' + item.desc + '</div>' : '')
      + (!isSoldout ? '<div class="menu-card-price-row"><span class="menu-card-price">' + (priceEx === 0 ? '無料' : fmtY(priceEx)) + '</span><span class="menu-card-price-in">税込' + fmtY(priceIn) + '</span></div>' : '')
      + qtyRow
      + '</div>'
      + addBtn
      + '</div>';
  }).join('');
  // お冷（ソフトドリンクの末尾に追加、store_configでONのときのみ）
  if (hasOhiya && currentSubcat === 'ソフトドリンク') {
    var ohiyaKey = 'ohiya__ohiya__0';
    var ohiyaQty = cart[ohiyaKey] ? cart[ohiyaKey].qty : 0;
    var ohiyaQtyRow = ohiyaQty > 0
      ? '<div class="qty-row"><button class="qty-btn" onclick="event.stopPropagation();window.changeQty(\'' + ohiyaKey + '\',-1)">−</button><span class="qty-num">' + ohiyaQty + '</span><button class="qty-btn" onclick="event.stopPropagation();window.addOhiya()">+</button></div>'
      : '';
    var ohiyaAddBtn = ohiyaQty === 0
      ? '<button class="add-btn" onclick="event.stopPropagation();window.addOhiya()">+</button>'
      : '';
    html += '<div class="menu-card no-img" onclick="window.addOhiya()">'
      + '<div class="menu-card-body">'
      + '<div class="menu-card-name-row"><span class="menu-card-name">お冷</span></div>'
      + '<div class="menu-card-price-row"><span class="menu-card-price">無料</span><span class="menu-card-price-in">税込¥0</span></div>'
      + ohiyaQtyRow
      + '</div>'
      + ohiyaAddBtn
      + '</div>';
  }
  document.getElementById('menu-list').innerHTML = html || '<div style="padding:40px;text-align:center;color:#9ca3af">商品がありません</div>';
}

// カート描画
function renderCart() {
  var totalEx = 0, totalIn = 0, count = 0, previewHTML = '';
  Object.entries(cart).forEach(function(entry) {
    var key = entry[0], c = entry[1];
    var extraPrice = c.extras ? c.extras.reduce(function(s, e) { return s + e.price; }, 0) : 0;
    var totalPrice = c.item.price + extraPrice;
    totalEx += totalPrice * c.qty;
    totalIn += taxIn(totalPrice) * c.qty;
    count += c.qty;
    previewHTML += '<div class="cart-item-row">'
      + '<button class="cart-item-qty-btn" onclick="window.changeQty(\'' + key + '\',-1)">−</button>'
      + '<span class="cart-item-qty">' + c.qty + '</span>'
      + '<button class="cart-item-qty-btn" onclick="window.changeQty(\'' + key + '\',1)">+</button>'
      + '<span class="cart-item-name">' + c.item.name + (c.extras && c.extras.length ? ' +' + c.extras.map(function(e) { return e.label; }).join('・') : '') + '</span>'
      + '<span class="cart-item-price">' + fmtY(totalPrice * c.qty) + '</span>'
      + '</div>';
  });
  document.getElementById('cart-count').textContent = 'カート: ' + count + '品';
  document.getElementById('cart-total-ex').textContent = fmtY(totalEx);
  document.getElementById('cart-total').textContent = '税込 ' + fmtY(totalIn);
  document.getElementById('cart-preview').innerHTML = previewHTML;
  document.getElementById('order-btn').disabled = count === 0;
  document.getElementById('cancel-btn').disabled = count === 0;
}

// アクション
window.selectCat = function(cat) { currentCat = cat; currentSubcat = null; renderCatTabs(); renderSubcatTabs(); renderMenu(); };
window.selectSubcat = function(sub) { currentSubcat = sub; renderSubcatTabs(); renderMenu(); };

var pendingOpt = null;
var selectedOpt = {};

window.addToCart = function(cat, sub, idx) {
  var item = (MENU_DATA[cat] || {})[sub];
  if (!item) return;
  item = item[idx];
  if (!item || soldout[item.name]) return;
  if (item.warning) { if (!confirm(item.warning)) return; }
  var optDef = ITEM_OPTIONS[item.name];
  if (optDef) {
    pendingOpt = { cat: cat, sub: sub, idx: idx, item: item, optDef: optDef };
    selectedOpt = {};
    document.getElementById('opt-item-name').textContent = item.name;
    document.getElementById('opt-label').textContent = optDef.label;
    var confirmBtn = document.getElementById('opt-confirm');
    confirmBtn.disabled = optDef.type === 'required';
    var html = optDef.choices.map(function(c, i) {
      var label = typeof c === 'string' ? c : c.label;
      var price = typeof c === 'object' ? c.price : null;
      var isCheck = optDef.type === 'optional';
      return '<div class="opt-choice" id="opt-c-' + i + '" onclick="window.selectOpt(' + i + ')">'
        + '<span class="' + (isCheck ? 'opt-choice-check' : 'opt-choice-radio') + '"></span>'
        + '<span>' + label + '</span>'
        + (price ? '<span class="opt-price">+￥' + price.toLocaleString() + '</span>' : '')
        + '</div>';
    }).join('');
    document.getElementById('opt-choices').innerHTML = html;
    document.getElementById('opt-modal').classList.add('open');
    return;
  }
  addItemToCart(cat, sub, idx, item, null, []);
};

window.selectOpt = function(i) {
  var optDef = pendingOpt.optDef;
  if (optDef.type === 'required') {
    selectedOpt = { choice: i };
    document.querySelectorAll('.opt-choice').forEach(function(el, j) { el.classList.toggle('selected', j === i); });
    document.getElementById('opt-confirm').disabled = false;
  } else {
    if (selectedOpt[i]) delete selectedOpt[i]; else selectedOpt[i] = true;
    document.getElementById('opt-c-' + i).classList.toggle('selected', !!selectedOpt[i]);
  }
};

window.confirmOpt = function() {
  if (!pendingOpt) return;
  var cat = pendingOpt.cat, sub = pendingOpt.sub, idx = pendingOpt.idx, item = pendingOpt.item, optDef = pendingOpt.optDef;
  var optLabel = '', extras = [];
  if (optDef.type === 'required') {
    optLabel = optDef.choices[selectedOpt.choice];
  } else {
    optDef.choices.forEach(function(c, i) {
      if (selectedOpt[i]) extras.push({ label: c.label, price: c.price });
    });
  }
  addItemToCart(cat, sub, idx, item, optLabel, extras);
  window.closeOpt();
};

window.closeOpt = function() { document.getElementById('opt-modal').classList.remove('open'); pendingOpt = null; };

function addItemToCart(cat, sub, idx, item, optLabel, extras) {
  var optKey = optLabel || extras.map(function(e) { return e.label; }).join(',');
  var key = cat + '__' + sub + '__' + idx + (optKey ? '__' + optKey : '');
  var displayName = item.name + (optLabel ? '（' + optLabel + '）' : '');
  if (!cart[key]) cart[key] = { item: { name: displayName, price: item.price }, qty: 0, extras: extras };
  cart[key].qty++;
  renderMenu(); renderCart();
}

window.changeQty = function(key, delta) {
  if (!cart[key]) return;
  cart[key].qty += delta;
  if (cart[key].qty <= 0) delete cart[key];
  renderMenu(); renderCart();
};

window.requestBill = function() { document.getElementById('bill-confirm-modal').classList.add('open'); };
window.closeBillConfirm = function() {
  document.getElementById('bill-confirm-modal').classList.remove('open');
  // 中身を元に戻す
  document.querySelector('#bill-confirm-modal .bill-confirm-box').innerHTML =
    '<div class="bill-confirm-title">💳 お会計</div>'
    + '<div class="bill-confirm-sub">お会計でよろしいですか？<br>伝票をお持ちします。</div>'
    + '<div class="bill-confirm-btns">'
    + '<button class="bill-cancel-btn" onclick="window.closeBillConfirm()">キャンセル</button>'
    + '<button class="bill-ok-btn" onclick="window.confirmBill()">お会計</button>'
    + '</div>';
};
window.confirmBill = async function() {
  var tbl = new URLSearchParams(location.search).get('table') || '?';
  await set(ref(db, 'bill_calls/' + tbl), { table: tbl, timestamp: Date.now() });
  // モーダルの中身を「お待ちください」に差し替え
  document.querySelector('#bill-confirm-modal .bill-confirm-box').innerHTML =
    '<div class="bill-confirm-title">💳 ありがとうございます</div>'
    + '<div class="bill-confirm-sub">少々お待ちください。<br>店員が参ります。</div>'
    + '<div class="bill-confirm-btns"><button class="bill-cancel-btn" onclick="window.closeBillConfirm()">閉じる</button></div>';
};

window.callStaff = async function() {
  var btn = document.getElementById('call-btn');
  var tbl = new URLSearchParams(location.search).get('table') || '?';
  if (btn.classList.contains('calling')) {
    await remove(ref(db, 'calls/' + tbl));
    btn.classList.remove('calling');
    btn.innerHTML = '🔔<span>店員を呼ぶ</span>';
  } else {
    await set(ref(db, 'calls/' + tbl), { table: tbl, timestamp: Date.now() });
    btn.classList.add('calling');
    btn.innerHTML = '🔔<span>呼出中<span class="call-dot">.</span><span class="call-dot">.</span><span class="call-dot">.</span></span>';
    setTimeout(async function() {
      await remove(ref(db, 'calls/' + tbl));
      btn.classList.remove('calling');
      btn.innerHTML = '🔔<span>店員を呼ぶ</span>';
    }, 3 * 60 * 1000);
  }
};

var _historyItems = [];
var _historyPax = 1;
var _CHARGE_PER_PERSON = 250;
var _CHARGE_MODE = 'conditional';
var _CHARGE_FREE_DRINK_COUNT = 2;

window.showHistory = async function() {
  var snap = await new Promise(function(resolve) { onValue(ref(db, 'orders'), resolve, { onlyOnce: true }); });
  var data = snap.val() || {};
  var now = new Date(), todayStart = new Date(now);
  if (now.getHours() < 6) todayStart.setDate(todayStart.getDate() - 1);
  todayStart.setHours(6, 0, 0, 0);
  // チャージ設定を取得
  var cfgSnap = await get(ref(db, 'store_config'));
  var cfg = cfgSnap.val() || {};
  _CHARGE_PER_PERSON = cfg.charge_per_person !== undefined ? cfg.charge_per_person : 250;
  _CHARGE_MODE = cfg.charge_mode || 'conditional';
  _CHARGE_FREE_DRINK_COUNT = cfg.charge_free_drink_count !== undefined ? cfg.charge_free_drink_count : 2;
  var itemMap = {};
  Object.values(data).forEach(function(order) {
    if (order.table != tableNum) return;
    if ((order.timestamp || 0) < todayStart.getTime()) return;
    if (order.status === 'paid') return;
    (order.items || []).forEach(function(item) {
      var key = item.name + (item.extrasStr ? '__' + item.extrasStr : '');
      var baseName = item.name.replace(/（.*?）$/, '');
      var drinkNames = [];
      if (MENU_DATA['drink']) {
        Object.values(MENU_DATA['drink']).forEach(function(subcatItems) {
          (Array.isArray(subcatItems) ? subcatItems : Object.values(subcatItems)).forEach(function(i) { if (i.name) drinkNames.push(i.name); });
        });
      }
      var isDrink = baseName !== 'お冷' && drinkNames.indexOf(baseName) >= 0;
      if (!itemMap[key]) itemMap[key] = { name: item.name + (item.extrasStr ? '（' + item.extrasStr + '）' : ''), qty: 0, price: item.price || 0, isDrink: isDrink, charge_exempt: !!item.charge_exempt };
      itemMap[key].qty += item.qty;
    });
  });
  _historyItems = Object.values(itemMap);
  _historyPax = 1;
  renderHistoryModal();
  document.getElementById('history-modal').classList.add('open');
};

function renderHistoryModal() {
  var list = document.getElementById('history-list');
  if (_historyItems.length === 0) {
    list.innerHTML = '<div class="history-empty">まだ注文履歴がありません</div>';
    return;
  }
  var totalEx = 0;
  var itemsHTML = _historyItems.map(function(it) {
    var linePrice = it.price * it.qty;
    totalEx += linePrice;
    return '<div class="history-item"><span>' + it.name + '</span><div style="display:flex;gap:10px;align-items:center"><span class="history-qty">×' + it.qty + '</span><span class="history-price">' + fmtY(linePrice) + '</span></div></div>';
  }).join('');
  // チャージ計算（store_configのcharge_modeに従う）
  var drinkCount = 0;
  var hasExemptItem = false;
  _historyItems.forEach(function(it) {
    if (it.isDrink) drinkCount += it.qty;
    if (it.charge_exempt) hasExemptItem = true;
  });
  var chargeBase = _CHARGE_PER_PERSON * _historyPax;
  var chargeTotal = 0;
  var chargeLabel = '';
  if (_CHARGE_MODE === 'none' || hasExemptItem) {
    chargeTotal = 0;
    chargeLabel = hasExemptItem ? 'チャージ料（コース注文のため免除）' : 'チャージなし';
  } else if (_CHARGE_MODE === 'always') {
    chargeTotal = chargeBase;
    chargeLabel = 'チャージ料（¥' + _CHARGE_PER_PERSON.toLocaleString() + ' × ' + _historyPax + '名）';
  } else {
    var isFree = _historyPax > 0 && drinkCount >= _historyPax * _CHARGE_FREE_DRINK_COUNT;
    chargeTotal = isFree ? 0 : chargeBase;
    chargeLabel = isFree
      ? 'チャージ料（免除：ドリンク' + drinkCount + '杯 / ' + _historyPax + '名 × ' + _CHARGE_FREE_DRINK_COUNT + '杯）'
      : 'チャージ料（¥' + _CHARGE_PER_PERSON.toLocaleString() + ' × ' + _historyPax + '名）';
  }
  // 消費税・合計計算（小計税抜＋チャージ税抜に対して消費税）
  var finalEx = totalEx + chargeTotal;
  var finalIn = Math.floor(finalEx * 1.1 / 10) * 10;
  var finalTax = finalIn - finalEx;
  var paxHTML = _CHARGE_MODE === 'none' ? '' :
    '<div class="history-pax-row">'
    + '<span class="history-pax-label">人数（チャージ計算用）</span>'
    + '<button class="history-pax-btn" onclick="window.changeHistoryPax(-1)">−</button>'
    + '<span class="history-pax-num">' + _historyPax + '名</span>'
    + '<button class="history-pax-btn" onclick="window.changeHistoryPax(1)">+</button>'
    + '</div>';
  var summaryHTML = '<hr class="history-divider">'
    + '<div class="history-charge-row"><span>小計（税抜）</span><span>' + fmtY(totalEx) + '</span></div>'
    + (_CHARGE_MODE !== 'none' ? '<div class="history-charge-row"><span>' + chargeLabel + '</span><span>' + fmtY(chargeTotal) + '</span></div>' : '')
    + '<div class="history-charge-row"><span>消費税（10%）</span><span>' + fmtY(finalTax) + '</span></div>'
    + '<div class="history-total-row"><span>合計</span><span>' + fmtY(finalIn) + '</span></div>';
  list.innerHTML = paxHTML + itemsHTML + summaryHTML;
}

window.changeHistoryPax = function(delta) {
  _historyPax = Math.max(1, _historyPax + delta);
  renderHistoryModal();
};

window.closeHistory = function() { document.getElementById('history-modal').classList.remove('open'); };
window.cancelOrder = function() { cart = {}; renderMenu(); renderCart(); };

// お冷をカートに追加
window.addOhiya = function() {
  var key = 'ohiya__ohiya__0';
  if (cart[key]) {
    cart[key].qty += 1;
  } else {
    cart[key] = { item: { name: 'お冷', price: 0 }, qty: 1 };
  }
  renderMenu(); renderCart();
};

window.placeOrder = async function() {
  var items = [];
  Object.values(cart).forEach(function(c) {
    var item = { name: c.item.name, qty: c.qty, price: c.item.price };
    if (c.extras && c.extras.length > 0) {
      item.extrasStr = c.extras.map(function(e) { return e.label; }).join('・');
      item.price = c.item.price + c.extras.reduce(function(s, e) { return s + e.price; }, 0);
    }
    items.push(item);
  });
  if (items.length === 0) return;
  var total = Math.floor(items.reduce(function(s, i) { return s + taxIn(i.price) * i.qty; }, 0) / 10) * 10;
  document.getElementById('order-btn').disabled = true;
  document.getElementById('order-btn').textContent = '送信中...';
  var orderData = { table: tableNum, items: items, total: total, status: 'new', timestamp: Date.now() };
  // セットカテゴリのみの注文はsource:'set'を付ける
  var hasSetItems = Object.keys(cart).some(function(k) { return k.startsWith('set__'); });
  var hasNonSetItems = Object.keys(cart).some(function(k) { return !k.startsWith('set__') && !k.startsWith('ohiya__'); });
  if (hasSetItems && !hasNonSetItems) orderData.source = 'set';
  await push(ref(db, 'orders'), orderData);
  cart = {};
  renderMenu(); renderCart();
  document.getElementById('order-btn').textContent = '✓ 注文しました！';
  setTimeout(function() { document.getElementById('order-btn').textContent = '注文する'; }, 2000);
};

// 起動
init();
</script>

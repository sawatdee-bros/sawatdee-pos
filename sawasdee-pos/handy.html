<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; user-select: none; }

/* ヘッダー */
header { background: #1e293b; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 16px; font-weight: 700; color: #f1f5f9; }
.header-table { font-size: 13px; color: #fbbf24; font-weight: 700; }

/* テーブル選択 */
.table-bar { background: #1e293b; padding: 10px 12px; border-bottom: 1px solid #334155; display: flex; gap: 6px; overflow-x: auto; }
.table-bar::-webkit-scrollbar { display: none; }
.table-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 13px; font-weight: 600; cursor: pointer; }
.table-btn.active { background: #fbbf24; color: #1a1200; border-color: #fbbf24; }

/* カテゴリタブ */
.cat-bar { display: flex; overflow-x: auto; background: #1e293b; border-bottom: 1px solid #334155; }
.cat-bar::-webkit-scrollbar { display: none; }
.sub-bar { display: flex; overflow-x: auto; background: #0f172a; border-bottom: 1px solid #1e293b; }
.sub-bar::-webkit-scrollbar { display: none; }
.cat-btn { flex-shrink: 0; padding: 10px 16px; font-size: 13px; font-weight: 700; color: #64748b; border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; }
.cat-btn.active { color: #f1f5f9; border-bottom-color: #22c55e; background: #1e293b; }
.sub-btn { flex-shrink: 0; padding: 8px 14px; font-size: 11px; font-weight: 600; color: #64748b; border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; }
.sub-btn.active { color: #22c55e; border-bottom-color: #22c55e; }

/* メニューリスト */
.menu-list { padding: 6px; display: grid; grid-template-columns: repeat(5, 1fr); grid-auto-rows: 1fr; gap: 4px; padding-bottom: 180px; }
.menu-item { border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px 3px; cursor: pointer; border: 1.5px solid #334155; aspect-ratio: 1; position: relative; text-align: center; -webkit-tap-highlight-color: transparent; }
.menu-item:active { opacity: 0.6; transform: scale(0.95); }
.menu-item.in-cart { outline: 2px solid #22c55e; outline-offset: 1px; }
.menu-item-name { font-size: 9px; color: #e2e8f0; line-height: 1.25; word-break: break-all; }
.menu-item-badge { position: absolute; top: 2px; right: 2px; background: #22c55e; color: #000; font-size: 9px; font-weight: 800; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.qty-num { font-size: 14px; font-weight: 700; color: #f1f5f9; min-width: 18px; text-align: center; }

/* カート */
.cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 1px solid #334155; padding: 10px 12px; }
.cart-summary { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.cart-count { font-size: 13px; color: #94a3b8; }

.cart-btns { display: flex; gap: 8px; }
.cart-clear { padding: 12px 16px; background: transparent; border: 1px solid #ef4444; border-radius: 10px; color: #ef4444; font-size: 13px; font-weight: 600; cursor: pointer; }

/* 送信完了 */
.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #166534; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; display: none; z-index: 200; white-space: nowrap; }

/* === Phase 4: 席案内モーダル === */

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FC = {
  apiKey: 'AIzaSyBVfIZ_pUXqNAUljPBdsNlmVxkPEjvtUZQ',
  authDomain: 'sawatdee-bros.firebaseapp.com',
  databaseURL: 'https://sawatdee-bros-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId: 'sawatdee-bros',
  storageBucket: 'sawatdee-bros.firebasestorage.app',
  messagingSenderId: '1026345346676',
  appId: '1:1026345346676:web:98478c02d3dfbae3df310e'
};
const app = initializeApp(FC);
const db = getDatabase(app);

// === REST API読み込み（iOS Safari WebSocket "ゾンビ化"対策・customer.htmlと同じ方針） ===
const FB_BASE = FC.databaseURL;
async function fbRestGet(path, timeoutMs) {
  if (!timeoutMs) timeoutMs = 10000;
  const ctrl = new AbortController();
  const timer = setTimeout(function(){ ctrl.abort(); }, timeoutMs);
  try {
    const r = await fetch(FB_BASE + '/' + path + '.json', { signal: ctrl.signal, cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } finally { clearTimeout(timer); }
}
// === REST書き込み（書き込みもWSゾンビ化対策・customer.htmlと同方針） ===
async function fbRestPush(path, data, timeoutMs) {
  if (!timeoutMs) timeoutMs = 10000;
  const ctrl = new AbortController();
  const timer = setTimeout(function(){ ctrl.abort(); }, timeoutMs);
  try {
    const r = await fetch(FB_BASE + '/' + path + '.json', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
      signal: ctrl.signal
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const result = await r.json();
    return result && result.name;
  } finally { clearTimeout(timer); }
}
async function fbRestRemove(path, timeoutMs) {
  if (!timeoutMs) timeoutMs = 10000;
  const ctrl = new AbortController();
  const timer = setTimeout(function(){ ctrl.abort(); }, timeoutMs);
  try {
    const r = await fetch(FB_BASE + '/' + path + '.json', { method: 'DELETE', signal: ctrl.signal });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return true;
  } finally { clearTimeout(timer); }
}
async function fbRestSet(path, data, timeoutMs) {
  if (!timeoutMs) timeoutMs = 10000;
  const ctrl = new AbortController();
  const timer = setTimeout(function(){ ctrl.abort(); }, timeoutMs);
  try {
    const r = await fetch(FB_BASE + '/' + path + '.json', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
      signal: ctrl.signal
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } finally { clearTimeout(timer); }
}

const TABLE_COUNT = 10;
let TABLE_NAMES = {}; // store_config/table_names_shortから動的読み込み
function tableName(n) { return TABLE_NAMES[n] || 'T'+n; }
let GROUPS_DATA = {};
let APPROVAL_FLOW_ON = false; // フェーズ3以降の承認フローで参照（現状未使用）

// === Phase 4: 席案内モーダル（テーブルセッション発行） ===
// expiresAt は「次の day_start_hour（営業日切り替え時刻）」とする（kitchen.htmlと同方式）。
let _HANDY_DAY_START = 8; // store_config/day_start_hour（init()で上書き）
function _nextDayStartMs() {
  const t = new Date();
  t.setHours(_HANDY_DAY_START, 0, 0, 0);
  if (t.getTime() <= Date.now()) t.setDate(t.getDate() + 1);
  return t.getTime();
}

async function issueTableSession(tableNum, pax) {
  if (!pax || pax < 1) return;
  const now = Date.now();
  try {
    await fbRestSet('tables/' + tableNum + '/session', {
      startedAt: now,
      expiresAt: _nextDayStartMs(),
      pax: pax,
      issuedBy: 'handy'
    });
  } catch(e) { console.error('テーブルセッション発行失敗:', e); }
}

let _arriveSelectedTable = null;
let _arrivePax = 0; // 誤発行防止：0スタート・1以上にしないと発行ボタンが押せない
let _arriveActiveSessions = {};
// Phase 4 追補：注文送信時の強制モード用
let _pendingOrderResolve = null;
let _arriveForcedTable = null;

window.openArriveModal = async function() {
  _arriveSelectedTable = null;
  _arrivePax = 0;
  _arriveForcedTable = null; // 通常モード（強制モード状態をクリア）
  if (_pendingOrderResolve) { _pendingOrderResolve(false); _pendingOrderResolve = null; }
  try {
    const data = await fbRestGet('tables') || {};
    _arriveActiveSessions = {};
    const now = Date.now();
    Object.keys(data).forEach(function(t) {
      const s = data[t] && data[t].session;
      if (s && s.expiresAt && s.expiresAt > now) _arriveActiveSessions[t] = true;
    });
  } catch(e) { _arriveActiveSessions = {}; console.error('arrive: tables 取得失敗', e); }
  renderArriveModal();
  // 通常モード：タイトル・ボタン文言を初期状態に
  const titleEl = document.querySelector('#arrive-modal .arrive-title');
  if (titleEl) titleEl.textContent = '🪑 お客様ご来店・席案内';
  const issueBtn = document.getElementById('arrive-issue-btn');
  if (issueBtn) issueBtn.textContent = 'セッション発行';
  document.getElementById('arrive-modal').classList.add('open');
};

window.closeArriveModal = function() {
  document.getElementById('arrive-modal').classList.remove('open');
  // 強制モードでキャンセルされた → 注文中止
  if (_pendingOrderResolve) {
    const r = _pendingOrderResolve;
    _pendingOrderResolve = null;
    _arriveForcedTable = null;
    r(false);
  }
};

function renderArriveModal() {
  const grid = document.getElementById('arrive-tables-grid');
  if (!grid) return;
  let html = '';
  for (let n = 1; n <= TABLE_COUNT; n++) {
    const ns = String(n);
    const label = TABLE_NAMES[n] || ('T'+n);
    const inSession = _arriveActiveSessions[ns] ? ' in-session' : '';
    const active = (_arriveSelectedTable === ns) ? ' active' : '';
    // 強制モード時：注文しようとしている卓以外は disabled（誤って別卓に切替できない）
    const forcedDisabled = (_arriveForcedTable && _arriveForcedTable !== ns)
      ? ' disabled style="opacity:0.25;pointer-events:none"'
      : '';
    html += '<button class="arrive-table-btn' + inSession + active + '"' + forcedDisabled
      + ' onclick="window.arriveSelectTable(\'' + n + '\')">' + label + '</button>';
  }
  grid.innerHTML = html;
  const inp = document.getElementById('arrive-pax-input');
  // PAX=0 のときは空文字表示（誤発行防止のためデフォルト値で押すクセを断つ）
  if (inp && document.activeElement !== inp) inp.value = _arrivePax > 0 ? _arrivePax : '';
  // 発行ボタン：テーブル選択 + PAX>=1 で有効
  document.getElementById('arrive-issue-btn').disabled = !_arriveSelectedTable || _arrivePax < 1;
}

window.arriveSelectTable = async function(t) {
  const ts = String(t);
  // F3-c: 既セッション中テーブルをタップ → 取消確認モーダル
  if (_arriveActiveSessions[ts]) {
    const label = TABLE_NAMES[ts] || ('T'+ts);
    if (!confirm(label + ' は着席中です。\nセッションを取り消して新規案内しますか？')) return;
    try {
      await fbRestRemove('tables/' + ts + '/session');
      await fbRestRemove('pax/' + ts);
      delete _arriveActiveSessions[ts];
    } catch(e) {
      console.error('セッション取消失敗:', e);
      alert('取り消しに失敗しました。もう一度お試しください。');
      return;
    }
  }
  _arriveSelectedTable = ts;
  renderArriveModal();
};

window.arriveChangePax = function(d) {
  _arrivePax = Math.max(0, _arrivePax + d); // 0まで下げ可（誤発行防止）
  renderArriveModal();
};

// F3-b: 数字直接入力対応
window.arriveSetPax = function(val) {
  if (val === '' || val === null || val === undefined) { _arrivePax = 0; document.getElementById('arrive-issue-btn').disabled = !_arriveSelectedTable || _arrivePax < 1; return; }
  const n = parseInt(val, 10);
  if (isNaN(n) || n < 0) return;
  _arrivePax = n > 99 ? 99 : n;
  document.getElementById('arrive-issue-btn').disabled = !_arriveSelectedTable || _arrivePax < 1;
};

window.confirmArrive = async function() {
  if (!_arriveSelectedTable || _arrivePax < 1) return;
  const t = _arriveSelectedTable;
  const pax = _arrivePax;
  const btn = document.getElementById('arrive-issue-btn');
  btn.disabled = true;
  btn.textContent = '発行中...';
  try {
    await issueTableSession(t, pax);
    await fbRestSet('pax/' + t, pax);
  } catch(e) {
    console.error('席案内発行失敗:', e);
    alert('セッション発行に失敗しました。もう一度お試しください。');
    btn.disabled = false;
    btn.textContent = _pendingOrderResolve ? '発行して注文' : 'セッション発行';
    return;
  }
  btn.textContent = 'セッション発行';
  // 強制モードからの呼び出し：注文継続のため resolve(true)
  if (_pendingOrderResolve) {
    const r = _pendingOrderResolve;
    _pendingOrderResolve = null;
    _arriveForcedTable = null;
    document.getElementById('arrive-modal').classList.remove('open');
    r(true);
    return;
  }
  window.closeArriveModal();
};

let currentTable = null;
let currentCat = 'drink';
let currentGroupIdx = 0;
let cart = {};

// テーブルボタン
const tableBar = document.getElementById('table-bar');
for (let i = 1; i <= TABLE_COUNT; i++) {
  const btn = document.createElement('button');
  btn.className = 'table-btn';
  btn.textContent = tableName(i);
  btn.onclick = () => selectTable(i);
  tableBar.appendChild(btn);
}

function selectTable(n) {
  currentTable = n;
  document.getElementById('header-table').textContent = tableName(n);
  document.querySelectorAll('.table-btn').forEach((b, i) => {
    b.classList.toggle('active', i + 1 === n);
  });
  if (!currentCat || !GROUPS_DATA[currentCat] || !GROUPS_DATA[currentCat].length) {
    currentCat = 'drink';
    currentGroupIdx = 0;
  }
  renderCats();
  renderMenu();
}

// カテゴリ・サブカテゴリ
function renderCats() {
  // 1行目：ドリンク / フード / セット
  const catBar = document.getElementById('cat-bar');
  catBar.innerHTML = '';
  const cats = [['drink','🥤 ドリンク'],['food','🍽 フード']];
  if (GROUPS_DATA['set'] && GROUPS_DATA['set'].length > 0) {
    cats.push(['set','🎁 セット']);
  }
  cats.forEach(([key,label]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (key === currentCat ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { currentCat = key; currentGroupIdx = 0; renderCats(); renderMenu(); };
    catBar.appendChild(btn);
  });
  // 2行目：サブカテゴリ
  const subBar = document.getElementById('sub-bar');
  subBar.innerHTML = '';
  GROUPS_DATA[currentCat].forEach((g, i) => {
    const btn = document.createElement('button');
    btn.className = 'sub-btn' + (i === currentGroupIdx ? ' active' : '');
    btn.textContent = g.name;
    btn.onclick = () => { currentGroupIdx = i; renderCats(); renderMenu(); };
    subBar.appendChild(btn);
  });
}

function fmtY(n) { return '¥' + n.toLocaleString(); }
var _ROUNDING_MODE = 'floor';
var _ROUNDING_UNIT = 10;
function applyRounding(val) {
  if (_ROUNDING_MODE === 'round') return Math.round(val / _ROUNDING_UNIT) * _ROUNDING_UNIT;
  if (_ROUNDING_MODE === 'ceil') return Math.ceil(val / _ROUNDING_UNIT) * _ROUNDING_UNIT;
  return Math.floor(val / _ROUNDING_UNIT) * _ROUNDING_UNIT;
}
function taxIn(p) { return Math.floor(p * 1.1); }

function renderMenu() {
  const list = document.getElementById('menu-list');
  if (!currentTable) { list.innerHTML = '<div style="padding:20px;color:#64748b;text-align:center;grid-column:1/-1">テーブルを選択してください</div>'; return; }
  if (!GROUPS_DATA[currentCat] || !GROUPS_DATA[currentCat][currentGroupIdx]) { list.innerHTML = ''; return; }
  const group = GROUPS_DATA[currentCat][currentGroupIdx];
  if (!group) return;
  const isSet = currentCat === 'set';
  const ohiyaQty = cart['ohiya'] ? cart['ohiya'].qty : 0;
  const itemsHTML = group.items.map((item, idx) => {
    const key = currentCat + '__g' + currentGroupIdx + '__' + idx;
    const qty = cart[key] ? cart[key].qty : 0;
    // サブカテゴリ名のハッシュから色を自動生成（マルチテナント対応）
    const subcat = item.subcat || '';
    const subcatColor = getSubcatColor(subcat);
    const itemBg = item.bg || subcatColor.bg;
    const itemBorder = item.border || subcatColor.border;
    return `<div class="menu-item${qty > 0 ? ' in-cart' : ''}"
      style="background:${itemBg};border-color:${qty > 0 ? '#22c55e' : itemBorder};"
      onclick="tapItem('${key}',${idx})">
      <div class="menu-item-name">${item.name}</div>
      ${qty > 0 ? `<div class="menu-item-badge">${qty}</div>` : ''}
    </div>`;
  }).join('');
  // お冷ボタンの配置：セットカテゴリでは非表示
  if (isSet) {
    list.innerHTML = itemsHTML;
    return;
  }
  const itemCount = group.items.length;
  let ohiyaStyle = '';
  if (itemCount < 21) {
    // 21番目が空いている→5行目左端に固定配置
    ohiyaStyle = 'grid-column: 1; grid-row: 5;';
  }
  // 21個以上の場合はそのまま最後に追加（styleなし）
  const ohiyaHTML = `<div class="menu-item${ohiyaQty > 0 ? ' in-cart' : ''}"
    style="background:#0c4a6e;border-color:${ohiyaQty > 0 ? '#22c55e' : '#7dd3fc'};${ohiyaStyle}"
    onclick="tapOhiya()">
    <div class="menu-item-name" style="color:#e0f2fe;">💧 お冷</div>
    ${ohiyaQty > 0 ? `<div class="menu-item-badge">${ohiyaQty}</div>` : ''}
  </div>`;
  list.innerHTML = itemsHTML + ohiyaHTML;
}

window.tapOhiya = function() {
  if (!currentTable) { alert('テーブルを選択してください'); return; }
  if (!cart['ohiya']) cart['ohiya'] = { name: 'お冷', price: 0, qty: 0 };
  cart['ohiya'].qty += 1;
  renderMenu();
  renderCart();
};

window.tapItem = function(key, idx) {
  if (!currentTable) { alert('テーブルを選択してください'); return; }
  const item = GROUPS_DATA[currentCat][currentGroupIdx].items[idx];
  if (!cart[key]) cart[key] = { name: item.name, price: item.price, qty: 0, charge_exempt: !!item.charge_exempt, price_type: item.price_type || null, category: currentCat };
  cart[key].qty += 1;
  renderMenu();
  renderCart();
};

function renderCart() {
  const items = Object.values(cart);
  const count = items.reduce((s, i) => s + i.qty, 0);
  const total = applyRounding(items.reduce((s, i) => s + (i.price_type === 'inclusive' ? i.price : i.price * 1.1) * i.qty, 0));
  document.getElementById('cart-count').textContent = 'カート: ' + count + '品';
  document.getElementById('cart-total').textContent = fmtY(total);
  document.getElementById('order-btn').disabled = count === 0 || !currentTable;
  document.getElementById('check-btn').disabled = count === 0 || !currentTable;
}

window.clearCart = function() {
  cart = {};
  renderMenu();
  renderCart();
};

function renderConfirm() {
  const entries = Object.entries(cart);
  let html = '';
  let totalEx = 0;
  entries.forEach(([key, item]) => {
    const ex = (item.price_type === 'inclusive' ? Math.floor(item.price / 1.1) : item.price) * item.qty;
    totalEx += ex;
    const inc = (item.price_type === 'inclusive' ? item.price : taxIn(item.price)) * item.qty;
    const safeKey = key.replace(/'/g, "\\'");
    html += '<div class="confirm-item">' +
      '<span class="confirm-item-name">' + item.name + '</span>' +
      '<div class="confirm-qty-ctrl">' +
        '<button class="confirm-qty-btn minus" onclick="confirmChangeQty(\'' + safeKey + '\',-1)">−</button>' +
        '<span class="confirm-qty-num">' + item.qty + '</span>' +
        '<button class="confirm-qty-btn" onclick="confirmChangeQty(\'' + safeKey + '\',1)">+</button>' +
      '</div>' +
      '<span class="confirm-item-price">' + fmtY(ex) + '</span>' +
      '</div>';
  });
  const totalIn = applyRounding(Object.values(cart).reduce((s, i) => s + (i.price_type === 'inclusive' ? i.price : i.price * 1.1) * i.qty, 0));
  const tax = totalIn - totalEx;
  html += '<div class="confirm-subtotal"><span>小計（税抜）</span><span>' + fmtY(totalEx) + '</span></div>';
  html += '<div class="confirm-subtotal"><span>消費税（10%）</span><span>' + fmtY(tax) + '</span></div>';
  html += '<div class="confirm-total"><span>合計（税込）</span><span>' + fmtY(totalIn) + '</span></div>';
  document.getElementById('confirm-list').innerHTML = html;
}

window.confirmChangeQty = function(key, delta) {
  if (!cart[key]) return;
  cart[key].qty += delta;
  if (cart[key].qty <= 0) delete cart[key];
  renderConfirm();
  renderMenu();
  renderCart();
  // カートが空になったらモーダルを閉じる
  if (Object.keys(cart).length === 0) closeConfirm();
};

window.showConfirm = function() {
  renderConfirm();
  document.getElementById('confirm-modal').classList.add('open');
};

window.closeConfirm = function() {
  document.getElementById('confirm-modal').classList.remove('open');
};

window.orderOhiya = async function() {
  if (!currentTable) { alert('テーブルを選択してください'); return; }
  const btn = document.getElementById('ohiya-btn');
  btn.textContent = '💧 送信中...';
  btn.disabled = true;
  await fbRestSet('ohiya/' + currentTable, {
    table: String(currentTable),
    tableName: tableName(currentTable),
    timestamp: Date.now()
  });
  btn.textContent = '💧 お冷 ✓';
  setTimeout(() => {
    btn.textContent = '💧 お冷';
    btn.disabled = false;
  }, 3000);
};

// 手打ち商品
window.openCustomModal = function() {
  document.getElementById('custom-name').value = '手打ち商品';
  document.getElementById('custom-price').value = '';
  // 初期選択は現在開いているタブ（drink/food）。それ以外なら food
  var defaultCat = (currentCat === 'drink') ? 'drink' : 'food';
  document.getElementById('custom-cat-' + defaultCat).checked = true;
  document.getElementById('custom-modal').classList.add('open');
  setTimeout(() => document.getElementById('custom-name').focus(), 100);
};
window.closeCustomModal = function() {
  document.getElementById('custom-modal').classList.remove('open');
};
window.addCustomItem = function() {
  const name = document.getElementById('custom-name').value.trim();
  const price = parseInt(document.getElementById('custom-price').value) || 0;
  const cat = (document.querySelector('input[name="custom-cat"]:checked') || {}).value || 'food';
  if (!name) { alert('商品名を入力してください'); return; }
  const key = 'custom__' + Date.now();
  cart[key] = { name: name, price: price, qty: 1, charge_exempt: false, price_type: null, category: cat };
  window.closeCustomModal();
  renderMenu();
  renderCart();
};

// サブカテゴリ名から衝突しない色を生成
// 初回登場順に番号を振り、黄金角で均等分散した色相を割り当てる
var _subcatColorCache = {};
var _subcatCounter = 0;
var GOLDEN_ANGLE = 137.508;
function getSubcatColor(subcat) {
  if (!subcat) subcat = '';
  if (!_subcatColorCache[subcat]) {
    var hue = Math.round((_subcatCounter * GOLDEN_ANGLE) % 360);
    _subcatCounter++;
    _subcatColorCache[subcat] = {
      bg: 'hsl(' + hue + ',45%,11%)',
      border: 'hsl(' + hue + ',75%,42%)'
    };
  }
  return _subcatColorCache[subcat];
}

// Phase 4 追補: 注文送信前のPAXチェック
// pax/{tableNum} が未入力なら席案内モーダルを強制表示し、入力完了で注文継続
async function ensurePaxAndSession(tableNum) {
  let paxVal = 0;
  try {
    const p = await fbRestGet('pax/' + tableNum);
    paxVal = (typeof p === 'number' && p > 0) ? p : 0;
  } catch(e) {}
  if (paxVal > 0) return true; // 既に入力済み
  // 未入力 → 強制モーダルで入力させる
  return new Promise(function(resolve) {
    _pendingOrderResolve = resolve;
    _arriveForcedTable = String(tableNum);
    _arriveSelectedTable = String(tableNum);
    _arrivePax = 0; // 誤発行防止：0スタート
    // 既セッションマップを取得（普通の openArriveModal と同じ初期化）
    fbRestGet('tables').then(function(data) {
      _arriveActiveSessions = {};
      const now = Date.now();
      Object.keys(data || {}).forEach(function(t) {
        const s = (data[t] || {}).session;
        if (s && s.expiresAt && s.expiresAt > now) _arriveActiveSessions[t] = true;
      });
    }).catch(function(){ _arriveActiveSessions = {}; }).finally(function() {
      renderArriveModal();
      // 強制モード時のUI調整
      const titleEl = document.querySelector('#arrive-modal .arrive-title');
      if (titleEl) titleEl.textContent = '🪑 ' + (TABLE_NAMES[tableNum] || ('T'+tableNum)) + ' に人数を入力してください';
      const issueBtn = document.getElementById('arrive-issue-btn');
      if (issueBtn) { issueBtn.textContent = '発行して注文'; issueBtn.disabled = false; }
      document.getElementById('arrive-modal').classList.add('open');
    });
  });
}

window.placeOrder = async function() {
  const items = Object.values(cart).map(c => ({
    name: c.name, qty: c.qty, price: c.price,
    ...(c.charge_exempt ? { charge_exempt: true } : {}),
    ...(c.price_type ? { price_type: c.price_type } : {}),
    ...(c.category ? { category: c.category } : {})
  }));
  if (!items.length || !currentTable) return;
  // PAX チェック（未入力なら強制モーダル）
  const paxOk = await ensurePaxAndSession(currentTable);
  if (!paxOk) return; // ユーザがキャンセル
  document.getElementById('order-btn').disabled = true;
  document.getElementById('order-btn').textContent = '送信中...';
  const total = applyRounding(items.filter(i => i.price > 0).reduce((s, i) => s + (i.price_type === 'inclusive' ? i.price : i.price * 1.1) * i.qty, 0));
  const hasSetItems = Object.keys(cart).some(k => k.startsWith('set__'));
  const hasNonSetItems = Object.keys(cart).some(k => !k.startsWith('set__') && k !== 'ohiya');
  const orderData = {
    table: String(currentTable),
    items, total,
    status: 'new',
    timestamp: Date.now(),
    source: hasSetItems && !hasNonSetItems ? 'set' : 'handy'
  };
  await fbRestPush('orders', orderData);
  cart = {};
  renderMenu();
  renderCart();
  document.getElementById('order-btn').textContent = '注文を送信';
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
};

// 初期化
// 初期データ取得はREST API（HTTPS）で並列化。WebSocketゾンビ化を回避。
async function init() {
  try {
    const results = await Promise.all([
      fbRestGet('store_config'),
      fbRestGet('handy_groups'),
      fbRestGet('menu/set')
    ]);
    const cfg = results[0] || {};
    if (cfg.rounding_mode) _ROUNDING_MODE = cfg.rounding_mode;
    if (cfg.rounding_unit) _ROUNDING_UNIT = cfg.rounding_unit;
    if (cfg.day_start_hour != null) _HANDY_DAY_START = cfg.day_start_hour;
    if (cfg.table_names_short) TABLE_NAMES = cfg.table_names_short;
    else if (cfg.table_names) TABLE_NAMES = cfg.table_names;
    APPROVAL_FLOW_ON = cfg.enable_approval_flow === true;
    GROUPS_DATA = results[1] || {};
    // menu/set をhandy_groups形式に変換して追加
    const setData = results[2];
    if (setData && Object.keys(setData).length > 0) {
      GROUPS_DATA['set'] = Object.keys(setData).map(subcat => {
        const items = Array.isArray(setData[subcat]) ? setData[subcat] : Object.values(setData[subcat] || {});
        return {
          name: subcat,
          items: items.filter(i => i.active).map(i => ({ name: i.name, price: i.price, subcat: subcat, ...(i.charge_exempt ? { charge_exempt: true } : {}), ...(i.price_type ? { price_type: i.price_type } : {}) }))
        };
      }).filter(g => g.items.length > 0);
    }
    renderCats();
    renderMenu();
    renderCart();
  } catch(e) {
    console.error('初期化失敗:', e);
  }
}
init();
</script>

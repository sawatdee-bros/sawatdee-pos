<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伝票一覧 - タイ料理レストラン</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; min-height: 100vh; }
header { background: #1e293b; padding: 14px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #334155; }
.back-btn { color: #94a3b8; text-decoration: none; font-size: 20px; line-height: 1; }
header h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; flex: 1; }
.filter-bar { display: flex; gap: 8px; padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #334155; overflow-x: auto; }
.filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 13px; cursor: pointer; white-space: nowrap; }
.filter-btn.active { background: #1d4ed8; border-color: #1d4ed8; color: white; }
.filter-btn.paid-tab { border-color: #7c3aed; color: #a78bfa; }
.filter-btn.paid-tab.active { background: #7c3aed; border-color: #7c3aed; color: white; }
.summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px 16px; }
.summary-card { background: #1e293b; border-radius: 10px; padding: 12px; text-align: center; border: 1px solid #334155; }
.summary-label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
.summary-value { font-size: 18px; font-weight: 700; color: #f1f5f9; }
.receipts-wrap { padding: 16px; padding-bottom: 72px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }
.receipt { background: #fffef0; border-radius: 2px; width: 220px; flex-shrink: 0; box-shadow: 2px 3px 8px rgba(0,0,0,0.4); font-family: 'Courier New', Courier, monospace; color: #1a1a1a; }
.receipt.active { outline: 2px solid #fbbf24; }
.receipt.done { opacity: 0.55; }
.receipt.paid { opacity: 0.4; filter: grayscale(0.3); }
.receipt-top { height: 14px; background: repeating-linear-gradient(90deg, #fffef0 0px, #fffef0 10px, transparent 10px, transparent 14px); border-top: 2px dashed #ccc; }
.receipt-inner { padding: 10px 14px 14px; }
.receipt-table { text-align: center; font-size: 20px; font-weight: 900; margin: 4px 0 2px; color: #111; }
.receipt-time { text-align: center; font-size: 10px; color: #666; margin-bottom: 8px; }
.receipt-status { text-align: center; margin-bottom: 6px; }
.pill-active { display: inline-block; background: #fbbf24; color: #1a1200; font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
.pill-done { display: inline-block; background: #166534; color: white; font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
.pill-paid { display: inline-block; background: #7c3aed; color: white; font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
.receipt-divider { border: none; border-top: 1px dashed #aaa; margin: 6px 0; }
.receipt-pax { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 4px 0; }
.receipt-pax label { font-size: 11px; color: #666; }
.pax-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #aaa; background: #f5f5e0; color: #333; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; }
.pax-num { font-size: 14px; font-weight: 700; min-width: 28px; text-align: center; color: #111; }
.receipt-category { font-size: 10px; font-weight: 700; color: #888; letter-spacing: 0.05em; padding: 2px 0 3px; }
.receipt-item { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; color: #222; border-bottom: 1px dashed #ccc; }
.receipt-item:last-child { border-bottom: none; }
.receipt-item.pending { color: #dc2626; font-weight: 600; }
.receipt-item-name { flex: 1; padding-right: 6px; }
.receipt-item-price { white-space: nowrap; }
.receipt-subtotal { display: flex; justify-content: space-between; font-size: 11px; color: #666; padding: 2px 0; }
.receipt-charge { display: flex; justify-content: space-between; font-size: 12px; color: #dc2626; font-weight: 600; padding: 3px 0; border-bottom: 1px dashed #ccc; }
.receipt-charge-free { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; text-decoration: line-through; padding: 2px 0; }
.receipt-total { display: flex; justify-content: space-between; font-size: 14px; font-weight: 900; padding: 4px 0 2px; color: #111; }
.pay-btn { width: 100%; margin-top: 10px; padding: 7px 0; background: #7c3aed; color: white; border: none; border-radius: 4px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Courier New', Courier, monospace; }
.pay-btn:disabled { background: #ccc; color: #888; cursor: default; }
.delete-btn { width: 100%; margin-top: 6px; padding: 6px 0; background: transparent; border: 1px solid #ef4444; border-radius: 4px; font-size: 11px; color: #ef4444; cursor: pointer; font-family: 'Courier New', Courier, monospace; }
.delete-btn:hover { background: #fee2e2; }
.edit-btn { width: 100%; margin-top: 6px; padding: 6px 0; background: transparent; border: 1px solid #aaa; border-radius: 4px; font-size: 11px; color: #666; cursor: pointer; font-family: 'Courier New', Courier, monospace; }
.edit-btn:hover { background: #f0f0e0; }
.receipt-bottom { height: 14px; background: repeating-linear-gradient(90deg, #fffef0 0px, #fffef0 10px, transparent 10px, transparent 14px); border-bottom: 2px dashed #ccc; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; color: #475569; text-align: center; width: 100%; }
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 56px; background: #1e293b; border-top: 1px solid #334155; display: flex; z-index: 200; }
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; text-decoration: none; color: #64748b; font-size: 10px; cursor: pointer; border: none; background: none; }
.tab-item.active { color: #22c55e; }
.tab-item:hover { color: #94a3b8; }
.tab-icon { font-size: 20px; line-height: 1; }
.icon-btns { display: flex; gap: 8px; }
.icon-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; }
.icon-btn:hover { background: #334155; color: #f1f5f9; }
/* 編集モーダル */
.edit-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 700; display: none; align-items: flex-start; justify-content: center; padding-top: 40px; overflow-y: auto; }
.edit-modal.open { display: flex; }
.edit-box { background: #1e293b; border-radius: 14px; border: 1px solid #334155; padding: 20px; width: 360px; max-width: 95vw; color: #e2e8f0; font-family: -apple-system, sans-serif; margin-bottom: 40px; }
.edit-title { font-size: 15px; font-weight: 600; color: #f1f5f9; margin-bottom: 14px; }
.edit-section { font-size: 11px; font-weight: 600; color: #64748b; letter-spacing: 0.05em; margin: 12px 0 6px; text-transform: uppercase; }
.edit-item-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #334155; }
.edit-item-row:last-child { border-bottom: none; }
.edit-item-name { flex: 1; font-size: 13px; color: #cbd5e1; }
.edit-item-price { font-size: 12px; color: #64748b; min-width: 52px; text-align: right; }
.edit-cancel-btn { padding: 3px 10px; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; white-space: nowrap; background: #7f1d1d; color: #fca5a5; }
.edit-qty-ctrl { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.edit-qty-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #475569; background: transparent; color: #94a3b8; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
.edit-qty-btn:hover { background: #334155; color: #f1f5f9; }
.edit-qty-btn.del { border-color: #7f1d1d; color: #fca5a5; }
.edit-qty-btn.del:hover { background: #7f1d1d; }
.edit-qty-num { font-size: 13px; font-weight: 600; min-width: 20px; text-align: center; color: #f1f5f9; }
.edit-item-row.cancelled { opacity: 0.3; }
.edit-add-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #334155; }
.edit-add-row:last-child { border-bottom: none; }
.edit-add-name { flex: 1; font-size: 13px; color: #94a3b8; }
.edit-add-price { font-size: 12px; color: #64748b; min-width: 52px; text-align: right; }
.edit-add-btn { padding: 3px 10px; background: #166534; border: none; border-radius: 6px; color: white; font-size: 11px; cursor: pointer; white-space: nowrap; }
.edit-added { font-size: 12px; color: #22c55e; padding: 6px 0; }
.edit-save-btn { width: 100%; padding: 11px; background: #166534; border: none; border-radius: 8px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 14px; }
.edit-close-btn { width: 100%; padding: 9px; background: transparent; border: 1px solid #334155; border-radius: 8px; color: #64748b; font-size: 13px; cursor: pointer; margin-top: 8px; }

.audio-icon-btn { position: relative; width: 36px; height: 36px; border-radius: 8px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.audio-icon-btn.enabled { color: #22c55e; border-color: #166534; }
.audio-slash { position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; pointer-events: none; }
.audio-slash line { stroke: #ef4444; stroke-width: 2.5; stroke-linecap: round; }
</style>
</head>
<body>
<header>
  <h1>&#129518; 伝票一覧</h1>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="icon-btns">
      <button class="audio-icon-btn" id="_audio-btn" onclick="window._toggleAudio()" title="音声ON/OFF">
        🔔
        <svg class="audio-slash" id="_audio-slash" viewBox="0 0 28 28">
          <line x1="4" y1="4" x2="24" y2="24"/>
        </svg>
      </button>
      <a class="icon-btn" href="menu-admin.html" title="商品管理">⚙️</a>
      <a class="icon-btn" href="sales.html" title="売上管理">📊</a>
    </div>
  </div>
</header>
<div class="filter-bar">
  <button class="filter-btn active" onclick="window.setFilter('all',this)">すべて</button>
  <button class="filter-btn" onclick="window.setFilter('active',this)">対応中</button>
  <button class="filter-btn" onclick="window.setFilter('done',this)">提供済み</button>
  <button class="filter-btn paid-tab" onclick="window.setFilter('paid',this)">会計済み</button>
  <button class="filter-btn" onclick="window.setFilter('1',this)">T1</button>
  <button class="filter-btn" onclick="window.setFilter('2',this)">T2</button>
  <button class="filter-btn" onclick="window.setFilter('3',this)">T3</button>
  <button class="filter-btn" onclick="window.setFilter('4',this)">T4</button>
  <button class="filter-btn" onclick="window.setFilter('5',this)">T5</button>
</div>
<div class="summary-bar">
  <div class="summary-card"><div class="summary-label">総注文数</div><div class="summary-value" id="sum-count">0</div></div>
  <div class="summary-card"><div class="summary-label">対応中</div><div class="summary-value" id="sum-active">0</div></div>
  <div class="summary-card"><div class="summary-label">売上合計（税込）</div><div class="summary-value" id="sum-total">&#165;0</div></div>
</div>
<div class="receipts-wrap" id="receipts-wrap">
  <div class="empty-state"><div style="font-size:40px;margin-bottom:12px">&#129518;</div><div style="color:#475569">伝票がありません</div></div>
</div>

<nav class="tab-bar">
  <a class="tab-item" id="tab-all" href="kitchen.html?mode=all"><span class="tab-icon">👁</span>全て</a>
  <a class="tab-item" id="tab-food" href="kitchen.html?mode=food"><span class="tab-icon">🍽</span>フード</a>
  <a class="tab-item" id="tab-drink" href="kitchen.html?mode=drink"><span class="tab-icon">🥤</span>ドリンク</a>
  <span class="tab-item active"><span class="tab-icon">🧾</span>伝票</span>
</nav>

<!-- 編集モーダル -->
<div class="edit-modal" id="edit-modal">
  <div class="edit-box">
    <div class="edit-title" id="edit-modal-title">伝票を編集</div>
    <div class="edit-section">現在の注文</div>
    <div id="edit-current"></div>
    <div id="edit-added" class="edit-added"></div>
    <div class="edit-section">商品を追加（即提供済み）</div>
    <div id="edit-menu"></div>
    <button class="edit-save-btn" onclick="window.saveEdit()">保存する</button>
    <button class="edit-close-btn" onclick="window.closeEdit()">キャンセル</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, update, push, remove, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

var FC = {
  apiKey: 'AIzaSyBVfIZ_pUXqNAUljPBdsNlmVxkPEjvtUZQ',
  authDomain: 'sawatdee-bros.firebaseapp.com',
  databaseURL: 'https://sawatdee-bros-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId: 'sawatdee-bros',
  storageBucket: 'sawatdee-bros.firebasestorage.app',
  messagingSenderId: '1026345346676',
  appId: '1:1026345346676:web:98478c02d3dfbae3df310e'
};
var app = initializeApp(FC);
var db = getDatabase(app);
var allOrders = {};
var currentFilter = 'all';
var paxStore = {};
var DRINKS = []; // Firebaseのmenu/drinkから動的ロード
get(ref(db, 'menu/drink')).then(function(snap) {
  var drinkData = snap.val() || {};
  Object.values(drinkData).forEach(function(items) {
    (items || []).forEach(function(item) {
      if (item && item.name && DRINKS.indexOf(item.name) < 0) DRINKS.push(item.name);
    });
  });
});
var CHARGE = 250;
var MENU_ALL = [
  {name:'パッタイ',price:1200},{name:'カオパット',price:900},
  {name:'クイッティアオ',price:850},{name:'カオマンガイ',price:950},
  {name:'グリーンカレー',price:1300},{name:'レッドカレー',price:1300},
  {name:'マッサマン',price:1400},{name:'イエローカレー',price:1250},
  {name:'生春巻き',price:700},{name:'トートマンプラー',price:750},
  {name:'ソムタム',price:800},{name:'サテー',price:900},
  {name:'タイアイスティー',price:400},{name:'マンゴーラッシー',price:450},
  {name:'シンハービール',price:600},{name:'お水',price:0}
];
var editState = null;

function fmtTime(ts) {
  var d = new Date(ts);
  return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
}
function fmtDate(ts) {
  var d = new Date(ts);
  return (d.getMonth()+1)+'/'+d.getDate()+' '+fmtTime(ts);
}

window.setFilter = function(f, btn) {
  currentFilter = f;
  var bs = document.querySelectorAll('.filter-btn');
  for (var i=0;i<bs.length;i++) bs[i].classList.remove('active');
  btn.classList.add('active');
  render();
};

window.changePax = function(t, d) {
  if (!paxStore[t]) paxStore[t] = 0;
  paxStore[t] = Math.max(0, paxStore[t]+d);
  render();
};

window.markPaid = function(tableNum, idStr) {
  var pax = paxStore[tableNum] !== undefined ? paxStore[tableNum] : 0;
  if (pax < 1) { alert('客数を1名以上入力してから会計済みにしてください。'); return; }
  if (!confirm('テーブル '+tableNum+' を会計済みにしますか？')) return;
  var keys = idStr.split(',');
  var paidAt = Date.now();
  for (var i=0;i<keys.length;i++) {
    if (keys[i]) update(ref(db,'orders/'+keys[i]), {status:'paid', paidAt:paidAt});
  }
};

// ---- 編集機能 ----
window.openEdit = function(tableNum, idStr) {
  var ids = idStr.split(',').filter(Boolean);
  var entries = [];
  for (var i=0;i<ids.length;i++) {
    if (allOrders[ids[i]]) entries.push({id:ids[i], o:allOrders[ids[i]]});
  }
  editState = {tableNum:tableNum, entries:entries, cancelSet:{}, qtyMap:{}, addItems:[]};
  document.getElementById('edit-modal-title').textContent = 'テーブル'+tableNum+' の伝票を編集';
  renderEditModal();
  document.getElementById('edit-modal').classList.add('open');
};

function renderEditModal() {
  // 同じ商品名でまとめて集約
  var groupMap = {};
  var groupOrder = [];
  for (var j=0;j<editState.entries.length;j++) {
    var e = editState.entries[j];
    var items = e.o.items||[];
    for (var k=0;k<items.length;k++) {
      var it = items[k];
      var key = e.id+'_'+k;
      var qtyOverride = editState.qtyMap[key];
      var qty = (qtyOverride !== undefined) ? qtyOverride : it.qty;
      if (!groupMap[it.name]) {
        groupMap[it.name] = {name:it.name, price:it.price, totalQty:0, keys:[]};
        groupOrder.push(it.name);
      }
      groupMap[it.name].totalQty += qty;
      groupMap[it.name].keys.push({key:key, entryId:e.id, itemIdx:k, qty:qty, origQty:it.qty});
    }
  }
  var html = '';
  for (var gi=0;gi<groupOrder.length;gi++) {
    var name = groupOrder[gi];
    var g = groupMap[name];
    var isCancelled = g.totalQty === 0;
    html += '<div class="edit-item-row'+(isCancelled?' cancelled':'')+'">'
      +'<span class="edit-item-name">'+g.name+'</span>'
      +'<span class="edit-item-price">\xa5'+(g.price*g.totalQty).toLocaleString()+'</span>'
      +'<div class="edit-qty-ctrl">'
      +'<button class="edit-qty-btn del" onclick="window.changeGroupQty(\''+name+'\',-1)">−</button>'
      +'<span class="edit-qty-num">'+g.totalQty+'</span>'
      +'<button class="edit-qty-btn" onclick="window.changeGroupQty(\''+name+'\',1)">+</button>'
      +'</div>'
      +'</div>';
  }
  document.getElementById('edit-current').innerHTML = html || '<div style="font-size:12px;color:#475569;padding:6px 0">なし</div>';

  // 追加予定の表示
  var counts = {};
  for (var i=0;i<editState.addItems.length;i++) { var n=editState.addItems[i].name; counts[n]=(counts[n]||0)+1; }
  var parts = []; Object.keys(counts).forEach(function(n){parts.push(n+'\xd7'+counts[n]);});
  document.getElementById('edit-added').textContent = parts.length ? '追加予定: '+parts.join('、') : '';

  // 追加メニュー
  var mhtml = '';
  for (var m=0;m<MENU_ALL.length;m++) {
    var mi = MENU_ALL[m];
    mhtml += '<div class="edit-add-row">'
      +'<span class="edit-add-name">'+mi.name+'</span>'
      +'<span class="edit-add-price">'+(mi.price===0?'無料':'\xa5'+mi.price.toLocaleString())+'</span>'
      +'<button class="edit-add-btn" onclick="window.addEditItem(\''+mi.name+'\','+mi.price+')">追加</button>'
      +'</div>';
  }
  document.getElementById('edit-menu').innerHTML = mhtml;
}

window.changeGroupQty = function(name, delta) {
  // 同じ商品名のkeysを全部取得して合計を計算
  var allKeys = [];
  for (var j=0;j<editState.entries.length;j++) {
    var e = editState.entries[j];
    var items = e.o.items||[];
    for (var k=0;k<items.length;k++) {
      if (items[k].name === name) {
        allKeys.push({key:e.id+'_'+k, entryId:e.id, itemIdx:k, origQty:items[k].qty});
      }
    }
  }
  // 現在の合計
  var totalQty = 0;
  for (var i=0;i<allKeys.length;i++) {
    var cur = editState.qtyMap[allKeys[i].key] !== undefined ? editState.qtyMap[allKeys[i].key] : allKeys[i].origQty;
    totalQty += cur;
  }
  var newTotal = Math.max(0, totalQty + delta);
  // 増やす場合：最初のエントリのqtyを+1
  if (delta > 0) {
    var first = allKeys[0];
    var cur = editState.qtyMap[first.key] !== undefined ? editState.qtyMap[first.key] : first.origQty;
    editState.qtyMap[first.key] = cur + 1;
  } else if (delta < 0 && totalQty > 0) {
    // 減らす場合：最後のエントリから順に減らす
    for (var i=allKeys.length-1;i>=0;i--) {
      var item = allKeys[i];
      var cur = editState.qtyMap[item.key] !== undefined ? editState.qtyMap[item.key] : item.origQty;
      if (cur > 0) { editState.qtyMap[item.key] = cur - 1; break; }
    }
  }
  renderEditModal();
};

window.changeEditQty = function(key, entryId, itemIdx, delta) {
  var origQty = (allOrders[entryId].items||[])[itemIdx].qty;
  var cur = editState.qtyMap[key] !== undefined ? editState.qtyMap[key] : origQty;
  var next = Math.max(0, cur + delta);
  if (next === origQty) delete editState.qtyMap[key];
  else editState.qtyMap[key] = next;
  // cancelSetも連動
  if (next === 0) editState.cancelSet[key] = {entryId:entryId, itemIdx:itemIdx, newQty:0};
  else delete editState.cancelSet[key];
  renderEditModal();
};

window.addEditItem = function(name, price) {
  editState.addItems.push({name:name, price:price});
  renderEditModal();
};

window.saveEdit = async function() {
  if (!editState) return;
  // 数量変更処理（qtyMapを元に各entryを更新）
  var qtyKeys = Object.keys(editState.qtyMap);
  var byEntry = {};
  for (var i=0;i<qtyKeys.length;i++) {
    var parts = qtyKeys[i].split('_');
    var eid = parts.slice(0,-1).join('_');
    var idx = parseInt(parts[parts.length-1]);
    if (!byEntry[eid]) byEntry[eid] = [];
    byEntry[eid].push({idx:idx, newQty:editState.qtyMap[qtyKeys[i]]});
  }
  for (var eid in byEntry) {
    var items = JSON.parse(JSON.stringify(allOrders[eid].items||[]));
    var changes = byEntry[eid];
    // 数量0は削除、それ以外は更新（降順で処理）
    changes.sort(function(a,b){return b.idx-a.idx;});
    for (var i=0;i<changes.length;i++) {
      if (changes[i].newQty === 0) items.splice(changes[i].idx, 1);
      else items[changes[i].idx].qty = changes[i].newQty;
    }
    var newTotal = Math.round(Math.floor(items.reduce(function(s,it){return s+it.price*it.qty;},0)*1.1)/10)*10;
    await update(ref(db,'orders/'+eid), {items:items, total:newTotal});
  }

  // 追加処理（即提供済み）
  if (editState.addItems.length > 0) {
    var addList = editState.addItems.map(function(it){return {name:it.name,qty:1,price:it.price};});
    var addTotal = Math.round(Math.floor(addList.reduce(function(s,it){return s+it.price*it.qty;},0)*1.1)/10)*10;
    var itemsDone = {};
    for (var x=0;x<addList.length;x++) itemsDone[x]=true;
    await push(ref(db,'orders'), {
      table: editState.tableNum,
      items: addList,
      total: addTotal,
      status: 'done',
      itemsDone: itemsDone,
      timestamp: Date.now()
    });
  }

  window.closeEdit();
};

window.deleteSession = async function(idStr) {
  if (!confirm('この伝票を削除しますか？')) return;
  var keys = idStr.split(',').filter(Boolean);
  for (var i=0;i<keys.length;i++) {
    await remove(ref(db,'orders/'+keys[i]));
  }
};

window.closeEdit = function() {
  editState = null;
  document.getElementById('edit-modal').classList.remove('open');
};

// ---- セッション構築 ----
function buildSessions() {
  var tableMap = {};
  var keys = Object.keys(allOrders);
  for (var i=0;i<keys.length;i++) {
    var id=keys[i]; var o=allOrders[id]; var t=o.table||'?';
    if (!tableMap[t]) tableMap[t]=[];
    tableMap[t].push({id:id,o:o});
  }
  var sessions = [];
  var tables = Object.keys(tableMap);
  for (var ti=0;ti<tables.length;ti++) {
    var t=tables[ti];
    var sorted=tableMap[t].sort(function(a,b){return a.o.timestamp-b.o.timestamp;});
    var sessionMap={};
    for (var si=0;si<sorted.length;si++) {
      var entry=sorted[si];
      var skey=entry.o.paidAt!=null?String(entry.o.paidAt):'__active__';
      if (!sessionMap[skey]) sessionMap[skey]=[];
      sessionMap[skey].push(entry);
    }
    var paidKeys=Object.keys(sessionMap).filter(function(k){return k!=='__active__';}).sort();
    for (var pi=0;pi<paidKeys.length;pi++) sessions.push({tableNum:t,entries:sessionMap[paidKeys[pi]]});
    if (sessionMap['__active__']) sessions.push({tableNum:t,entries:sessionMap['__active__']});
  }
  return sessions;
}

function makeItemRow(item) {
  var cls='receipt-item'+(item.pending?' pending':'');
  return '<div class="'+cls+'">'
    +'<span class="receipt-item-name">'+item.name+' \xd7'+item.qty+'</span>'
    +'<span class="receipt-item-price">\xa5'+(item.price*item.qty).toLocaleString()+'</span>'
    +'</div>';
}

function render() {
  var wrap = document.getElementById('receipts-wrap');
  var sessions = buildSessions();
  var allKeys = Object.keys(allOrders);
  var activeCount=0, totalSales=0;
  for (var i=0;i<allKeys.length;i++) {
    var o=allOrders[allKeys[i]];
    if (o.status!=='done'&&o.status!=='paid') activeCount++;
  }
  for (var i=0;i<sessions.length;i++) {
    var s=sessions[i];
    var sessionEx=0;
    for (var j=0;j<s.entries.length;j++) {
      var items=s.entries[j].o.items||[];
      for (var k=0;k<items.length;k++) sessionEx+=items[k].price*items[k].qty;
    }
    totalSales += Math.round(Math.floor(sessionEx*1.1)/10)*10;
  }
  document.getElementById('sum-count').textContent = allKeys.length;
  document.getElementById('sum-active').textContent = activeCount;
  document.getElementById('sum-total').textContent = '\xa5'+totalSales.toLocaleString();

  // フィルター
  var filtered=[];
  for (var i=0;i<sessions.length;i++) {
    var s=sessions[i];
    var isPaid=true, hasPending=false;
    for (var j=0;j<s.entries.length;j++) {
      var st=s.entries[j].o.status;
      if (st!=='paid') isPaid=false;
      if (st!=='done'&&st!=='paid') hasPending=true;
    }
    if (currentFilter==='paid'&&!isPaid) continue;
    if (currentFilter!=='paid'&&isPaid) continue;
    if (currentFilter==='active'&&!hasPending) continue;
    if (currentFilter==='done'&&(hasPending||isPaid)) continue;
    if (['1','2','3','4','5'].indexOf(currentFilter)>=0&&s.tableNum!==currentFilter) continue;
    filtered.push(s);
  }

  if (filtered.length===0) {
    wrap.innerHTML='<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">&#129518;</div><div style="color:#475569">伝票がありません</div></div>';
    return;
  }

  var html='';
  for (var i=0;i<filtered.length;i++) {
    var s=filtered[i];
    var tableNum=s.tableNum, entries=s.entries;
    var isPaid=true, hasActive=false, allDone=true;
    for (var j=0;j<entries.length;j++) {
      var st=entries[j].o.status;
      if (st!=='paid') isPaid=false;
      if (st!=='done'&&st!=='paid'){hasActive=true;allDone=false;}
    }
    if (isPaid) allDone=false;

    // アイテム集計
    var drinkMap={}, foodMap={};
    for (var j=0;j<entries.length;j++) {
      var o=entries[j].o;
      var itemsDone=o.itemsDone||{};
      var items=o.items||[];
      for (var k=0;k<items.length;k++) {
        var item=items[k];
        var map=DRINKS.indexOf(item.name)>=0?drinkMap:foodMap;
        if (!map[item.name]) map[item.name]={name:item.name,qty:0,price:item.price,pending:false};
        map[item.name].qty+=item.qty;
        if (!itemsDone[k]) map[item.name].pending=true;
      }
    }
    var drinkList=Object.keys(drinkMap).map(function(k){return drinkMap[k];});
    var foodList=Object.keys(foodMap).map(function(k){return foodMap[k];});
    var allList=drinkList.concat(foodList);
    var totalEx=0;
    for (var j=0;j<allList.length;j++) totalEx+=allList[j].price*allList[j].qty;

    // チャージ
    var pax=paxStore[tableNum]!==undefined?paxStore[tableNum]:0;
    var totalDrinks=0;
    for (var j=0;j<drinkList.length;j++) totalDrinks+=drinkList[j].qty;
    var chargeEx=CHARGE*pax;
    var hasFreeCharge=totalDrinks>=pax*2;
    var finalEx=totalEx+(hasFreeCharge?0:chargeEx);
    var finalInRaw=Math.floor(finalEx*1.1);
    var finalIn=Math.round(finalInRaw/10)*10;
    var finalTax=finalIn-finalEx;

    var firstTime=fmtDate(entries[0].o.timestamp);
    var entryIds=entries.map(function(e){return e.id;}).join(',');

    var pillHTML=isPaid?'<span class="pill-paid">会計済み</span>':hasActive?'<span class="pill-active">対応中</span>':'<span class="pill-done">提供済み</span>';
    var paxHTML='<div class="receipt-pax"><label>人数</label>';
    if (!isPaid) paxHTML+='<button class="pax-btn" onclick="window.changePax(\''+tableNum+'\',−1)">−</button>';
    paxHTML+='<span class="pax-num">'+pax+'名</span>';
    if (!isPaid) paxHTML+='<button class="pax-btn" onclick="window.changePax(\''+tableNum+'\',1)">+</button>';
    paxHTML+='</div>';

    var itemsHTML='';
    if (drinkList.length>0) {
      itemsHTML+='<div class="receipt-category">&#127370; ドリンク</div>';
      for (var j=0;j<drinkList.length;j++) itemsHTML+=makeItemRow(drinkList[j]);
    }
    if (drinkList.length>0&&foodList.length>0) itemsHTML+='<div style="height:8px"></div>';
    if (foodList.length>0) {
      itemsHTML+='<div class="receipt-category">&#127869; フード</div>';
      for (var j=0;j<foodList.length;j++) itemsHTML+=makeItemRow(foodList[j]);
    }

    var chargeHTML=hasFreeCharge
      ?'<div class="receipt-charge-free"><span>チャージ料 \xd7'+pax+'名（免除）</span><span>\xa5'+chargeEx.toLocaleString()+'</span></div>'
      :'<div class="receipt-charge"><span>チャージ料 \xd7'+pax+'名</span><span>\xa5'+chargeEx.toLocaleString()+'</span></div>';

    var payHTML=isPaid
      ?'<button class="pay-btn" disabled>\u2713 会計済み</button>'
      :'<button class="pay-btn" onclick="window.markPaid(\''+tableNum+'\',\''+entryIds+'\')">&#128180; 会計済みにする</button>';

    var editHTML=isPaid?'':'<button class="edit-btn" onclick="window.openEdit(\''+tableNum+'\',\''+entryIds+'\')">&#9999;&#65039; 伝票を編集する</button>';

    var receiptCls='receipt'+(isPaid?' paid':hasActive?' active':allDone?' done':'');

    html+='<div class="'+receiptCls+'">'
      +'<div class="receipt-top"></div>'
      +'<div class="receipt-inner">'
      +'<div class="receipt-table">テーブル '+tableNum+'</div>'
      +'<div class="receipt-time">'+firstTime+' 〜 '+entries.length+'回注文</div>'
      +'<div class="receipt-status">'+pillHTML+'</div>'
      +'<hr class="receipt-divider">'
      +paxHTML
      +'<hr class="receipt-divider">'
      +'<div class="receipt-items">'+itemsHTML+'</div>'
      +'<hr class="receipt-divider">'
      +'<div class="receipt-subtotal"><span>小計（税抜）</span><span>\xa5'+totalEx.toLocaleString()+'</span></div>'
      +chargeHTML
      +'<div class="receipt-subtotal"><span>消費税（10%）</span><span>\xa5'+finalTax.toLocaleString()+'</span></div>'
      +'<div class="receipt-total"><span>合計</span><span>\xa5'+finalIn.toLocaleString()+'</span></div>'
      +payHTML
      +editHTML
      +(isPaid ? '<button class="delete-btn" onclick="window.deleteSession(\'' + entryIds + '\')">🗑 この伝票を削除</button>' : '')
      +'</div>'
      +'<div class="receipt-bottom"></div>'
      +'</div>';
  }
  wrap.innerHTML=html;
}

function getTodayStart() {
  var now = new Date();
  var start = new Date(now);
  if (now.getHours() < 6) start.setDate(start.getDate() - 1);
  start.setHours(6, 0, 0, 0);
  return start.getTime();
}


// 音声再生（AudioContextを使い回す）
var _audioCtx = null;
function _getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}
function _playBeep() {
  if (localStorage.getItem('kitchen_audio') !== 'on') return;
  try {
    var ctx = _getAudioCtx();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}
function _applyAudioBtn() {
  var enabled = localStorage.getItem('kitchen_audio') === 'on';
  var btn = document.getElementById('_audio-btn');
  var slash = document.getElementById('_audio-slash');
  if (!btn) return;
  if (enabled) { btn.classList.add('enabled'); if(slash) slash.style.display = 'none'; }
  else { btn.classList.remove('enabled'); if(slash) slash.style.display = ''; }
}
window._toggleAudio = function() {
  var enabled = localStorage.getItem('kitchen_audio') === 'on';
  localStorage.setItem('kitchen_audio', enabled ? 'off' : 'on');
  // ユーザー操作でAudioContextを解放
  _getAudioCtx();
  if (!enabled) _playBeep();
  _applyAudioBtn();

// 最初のタッチ/クリックでAudioContextを解放
document.addEventListener('click', function _initAudio() {
  _getAudioCtx();
  document.removeEventListener('click', _initAudio);
}, { once: true });
};
_applyAudioBtn();

// 最初のタッチ/クリックでAudioContextを解放
document.addEventListener('click', function _initAudio() {
  _getAudioCtx();
  document.removeEventListener('click', _initAudio);
}, { once: true });

var _knownOrderIds = null;
onValue(ref(db,'orders'), function(snap) {
  var all = snap.val()||{};
  var todayStart = getTodayStart();
  // 新規注文検知
  var currentIds = Object.keys(all).filter(function(id){ return all[id].status !== 'done' && all[id].status !== 'paid'; });
  if (_knownOrderIds !== null) {
    var newIds = currentIds.filter(function(id){ return _knownOrderIds.indexOf(id) < 0; });
    if (newIds.length > 0) _playBeep();
  }
  _knownOrderIds = currentIds;
  allOrders = {};
  Object.keys(all).forEach(function(id) {
    if ((all[id].timestamp || 0) >= todayStart) allOrders[id] = all[id];
  });
  render();
});
</script>

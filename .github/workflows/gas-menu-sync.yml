name: Deploy GAS (メニュー同期)

on:
  push:
    branches: [main]
    paths:
      - 'sawasdee-pos/apps_script/menu-sync/**'
      - '.github/workflows/gas-menu-sync.yml'
  workflow_dispatch: {}

concurrency:
  group: gas-menu-sync
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: sawasdee-pos/apps_script/menu-sync
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Write clasp credentials
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC" ]; then
            echo "::error::CLASPRC_JSON secret is empty. Register it under repo Settings → Secrets."
            exit 1
          fi
          printf '%s' "$CLASPRC" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

      - name: Push to Apps Script
        run: clasp push -f

      - name: Deploy (update existing deployment, keep same URL)
        run: |
          STAMP=$(date -u +%Y-%m-%dT%H:%MZ)
          clasp deploy \
            --deploymentId AKfycbw5kkcOOWeImbwmzw_ePy9NTqZuZIZ0sJo0kdKHCaA8QqIxQ0iX8du-csARbb63FgSiwQ \
            --description "GitHub Actions $STAMP"

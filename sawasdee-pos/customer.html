<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご注文 - サワディーブロス</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; min-height: 100vh; padding-bottom: 180px; }
header { background: #1a1a2e; color: white; padding: 12px 16px; text-align: center; }
header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; }
header .table-no { font-size: 22px; font-weight: 700; color: #fbbf24; }

/* タブ */
.cat-tabs { display: flex; gap: 0; background: #fff; border-bottom: 2px solid #e5e7eb; position: sticky; top: 0; z-index: 100; align-items: center; }
.cat-tabs-scroll { display: flex; flex: 1; overflow-x: auto; }
.history-icon-btn { flex-shrink: 0; padding: 0 10px; height: 44px; background: transparent; border: none; border-left: 1px solid #e5e7eb; color: #6b7280; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; line-height: 1.2; }
.call-btn { flex-shrink: 0; padding: 0 10px; height: 44px; background: transparent; border: none; border-left: 1px solid #e5e7eb; color: #dc2626; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; line-height: 1.2; }
.bill-btn { flex-shrink: 0; padding: 0 10px; height: 44px; background: transparent; border: none; border-left: 1px solid #e5e7eb; color: #1d4ed8; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; line-height: 1.2; }
.bill-confirm-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 600; display: none; align-items: center; justify-content: center; padding: 20px; }
.bill-confirm-modal.open { display: flex; }
.bill-confirm-box { background: white; border-radius: 16px; padding: 24px 20px; width: 100%; max-width: 300px; text-align: center; }
.bill-confirm-title { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 8px; }
.bill-confirm-sub { font-size: 13px; color: #6b7280; margin-bottom: 20px; line-height: 1.6; }
.bill-confirm-btns { display: flex; gap: 10px; }
.bill-cancel-btn { flex: 1; padding: 12px; background: #f3f4f6; border: none; border-radius: 10px; color: #374151; font-size: 14px; font-weight: 600; cursor: pointer; }
.bill-ok-btn { flex: 2; padding: 12px; background: #1d4ed8; border: none; border-radius: 10px; color: white; font-size: 14px; font-weight: 700; cursor: pointer; }
.call-btn.calling { color: #dc2626; }
.call-dot { display: inline-block; opacity: 0.2; animation: dotFade 1.2s infinite; }
.call-dot:nth-child(1) { animation-delay: 0s; }
.call-dot:nth-child(2) { animation-delay: 0.4s; }
.call-dot:nth-child(3) { animation-delay: 0.8s; }
@keyframes dotFade { 0%,100%{opacity:0.2} 30%{opacity:1} }
.cat-tab { flex-shrink: 0; padding: 10px 14px; font-size: 13px; font-weight: 600; color: #6b7280; border-bottom: 3px solid transparent; cursor: pointer; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; }
.cat-tab.active { color: #166534; border-bottom-color: #166534; }
.subcat-tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; background: #f0fdf4; border-bottom: 1px solid #e5e7eb; position: sticky; top: 44px; z-index: 99; }
.subcat-tab { flex-shrink: 0; padding: 4px 12px; font-size: 12px; border-radius: 20px; border: 1px solid #d1d5db; background: white; color: #6b7280; cursor: pointer; white-space: nowrap; }
.subcat-tab.active { background: #166534; border-color: #166534; color: white; }

/* メニューカード */
.menu-list { padding: 8px 12px; display: flex; flex-direction: column; gap: 0; }
.menu-card { background: white; border-radius: 10px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; padding: 8px 10px; border: 1px solid #e5e7eb; position: relative; cursor: pointer; }
.menu-card:active { background: #f0fdf4; }
.menu-card.soldout { opacity: 0.45; pointer-events: none; }
.menu-card-img { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.menu-card.no-img { padding: 6px 10px; }
.menu-card-body { flex: 1; min-width: 0; }
.menu-card-name-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 2px; }
.menu-card-name { font-size: 14px; font-weight: 700; color: #111827; }
.menu-card-badges { display: flex; flex-wrap: wrap; gap: 3px; }
.badge { display: inline-flex; align-items: center; gap: 2px; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }
.badge-popular { background: #fef3c7; color: #92400e; }
.badge-recommend { background: #ede9fe; color: #5b21b6; }
.badge-sake { background: #dbeafe; color: #1e40af; }
.badge-pakchi { background: #d1fae5; color: #065f46; }
.spicy-icons { display: inline-flex; align-items: center; gap: 1px; }
.chili { font-size: 11px; }
.menu-card-lang { font-size: 10px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.menu-card-desc { font-size: 11px; color: #6b7280; line-height: 1.4; margin-bottom: 2px; }
.menu-card-price-row { display: flex; align-items: baseline; gap: 6px; margin-top: 2px; }
.menu-card-price { font-size: 15px; font-weight: 700; color: #166534; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.menu-card-price-in { font-size: 10px; color: #9ca3af; }
.soldout-badge { display: inline-block; background: #fee2e2; color: #dc2626; font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 10px; margin-top: 2px; }
.add-btn { position: absolute; right: 10px; bottom: 10px; width: 30px; height: 30px; border-radius: 50%; background: #166534; color: white; border: none; font-size: 20px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* カート */
/* オプションモーダル */
.opt-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; }
.opt-modal.open { display: flex; }
.opt-box { background: white; border-radius: 16px; padding: 20px; width: 100%; max-width: 340px; }
.opt-title { font-size: 15px; font-weight: 700; color: #111827; margin-bottom: 4px; }
.opt-subtitle { font-size: 12px; color: #6b7280; margin-bottom: 14px; }
.opt-choice { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; margin-bottom: 8px; cursor: pointer; font-size: 14px; color: #374151; }
.opt-choice.selected { border-color: #166534; background: #f0fdf4; color: #166534; font-weight: 600; }
.opt-choice-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #d1d5db; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.opt-choice.selected .opt-choice-radio { border-color: #166534; background: #166534; }
.opt-choice.selected .opt-choice-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: white; display: block; }
.opt-choice-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid #d1d5db; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.opt-choice.selected .opt-choice-check { border-color: #166534; background: #166534; color: white; }
.opt-price { margin-left: auto; font-size: 12px; color: #6b7280; }
.opt-btns { display: flex; gap: 8px; margin-top: 14px; }
.opt-cancel { flex: 1; padding: 12px; background: white; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; color: #6b7280; cursor: pointer; }
.opt-confirm { flex: 2; padding: 12px; background: #166534; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; color: white; cursor: pointer; }
.opt-confirm:disabled { background: #d1d5db; cursor: default; }

.cart-wrap { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 2px solid #e5e7eb; padding: 10px 14px 14px; z-index: 200; }
.cart-summary { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
.cart-count { font-size: 13px; color: #6b7280; }
.cart-total-ex { font-size: 22px; font-weight: 700; color: #166534; }
.cart-total-amount { font-size: 12px; color: #9ca3af; }
.cart-items-preview { font-size: 12px; color: #374151; margin-bottom: 6px; max-height: 90px; overflow-y: auto; }
.cart-item-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; border-bottom: 1px solid #f3f4f6; }
.cart-item-row:last-child { border-bottom: none; }
.cart-item-name { flex: 1; font-size: 12px; color: #374151; }
.cart-item-qty-btn { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #d1d5db; background: #f9fafb; color: #374151; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; }
.cart-item-qty { font-size: 12px; font-weight: 600; min-width: 18px; text-align: center; }
.cart-item-price { font-size: 11px; color: #6b7280; white-space: nowrap; }
.btn-row { display: flex; gap: 8px; }
.cancel-btn { padding: 12px 16px; background: white; color: #ef4444; border: 1px solid #ef4444; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.cancel-btn:disabled { color: #d1d5db; border-color: #d1d5db; cursor: default; }
.order-btn { flex: 1; padding: 14px; background: #166534; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
.order-btn:disabled { background: #d1d5db; color: #9ca3af; cursor: default; }
.qty-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.qty-btn { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #d1d5db; background: #f9fafb; color: #374151; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.qty-num { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }

.history-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: none; align-items: flex-end; justify-content: center; }
.history-modal.open { display: flex; }
.history-box { background: white; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 70vh; overflow-y: auto; }
.history-title { font-size: 16px; font-weight: 700; color: #111827; margin-bottom: 14px; text-align: center; }
.history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; color: #374151; }
.history-item:last-child { border-bottom: none; }
.history-qty { color: #6b7280; font-size: 13px; }
.history-empty { text-align: center; color: #9ca3af; padding: 30px 0; font-size: 14px; }
.history-close { width: 100%; margin-top: 14px; padding: 12px; background: #f3f4f6; border: none; border-radius: 10px; color: #374151; font-size: 14px; cursor: pointer; font-weight: 600; }
</style>
</head>
<body>
<header>
  <div class="table-no" id="table-no">テーブル ?</div>
  <h1>SAWATDEE BROS ご注文</h1>
</header>
<div class="cat-tabs"><div class="cat-tabs-scroll" id="cat-tabs"></div><button class="history-icon-btn" onclick="window.showHistory()">📋<span>注文履歴</span></button><button class="call-btn" id="call-btn" onclick="window.callStaff()">🔔<span>店員を呼ぶ</span></button><button class="bill-btn" onclick="window.requestBill()">💳<span>会計する</span></button></div>
<div class="subcat-tabs" id="subcat-tabs"></div>
<div class="menu-list" id="menu-list"></div>
<!-- オプションモーダル -->
<div class="opt-modal" id="opt-modal">
  <div class="opt-box">
    <div class="opt-title" id="opt-item-name"></div>
    <div class="opt-subtitle" id="opt-label"></div>
    <div id="opt-choices"></div>
    <div class="opt-btns">
      <button class="opt-cancel" onclick="window.closeOpt()">キャンセル</button>
      <button class="opt-confirm" id="opt-confirm" onclick="window.confirmOpt()">カートに追加</button>
    </div>
  </div>
</div>

<div class="cart-wrap">
  <div class="cart-items-preview" id="cart-preview"></div>
  <div class="cart-summary">
    <div class="cart-count" id="cart-count">カート: 0品</div>
    <div style="display:flex;align-items:baseline;gap:6px">
      <div class="cart-total-ex" id="cart-total-ex">¥0</div>
      <div class="cart-total-amount" id="cart-total">税込 ¥0</div>
    </div>
  </div>
  <div class="btn-row">
    <button class="cancel-btn" id="cancel-btn" onclick="window.cancelOrder()" disabled>✕ キャンセル</button>
    <button class="order-btn" id="order-btn" onclick="window.placeOrder()" disabled>注文する</button>
  </div>
</div>


<!-- 注文履歴モーダル -->
<div class="bill-confirm-modal" id="bill-confirm-modal">
  <div class="bill-confirm-box">
    <div class="bill-confirm-title">💳 お会計</div>
    <div class="bill-confirm-sub">お会計でよろしいですか？<br>伝票をお持ちします。</div>
    <div class="bill-confirm-btns">
      <button class="bill-cancel-btn" onclick="window.closeBillConfirm()">キャンセル</button>
      <button class="bill-ok-btn" onclick="window.confirmBill()">お会計</button>
    </div>
  </div>
</div>

<div class="history-modal" id="history-modal">
  <div class="history-box">
    <div class="history-title">📋 注文履歴</div>
    <div id="history-list"></div>
    <button class="history-close" onclick="window.closeHistory()">閉じる</button>
  </div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, set, remove, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FC = {
  apiKey: 'AIzaSyBVfIZ_pUXqNAUljPBdsNlmVxkPEjvtUZQ',
  authDomain: 'sawatdee-bros.firebaseapp.com',
  databaseURL: 'https://sawatdee-bros-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId: 'sawatdee-bros',
  storageBucket: 'sawatdee-bros.firebasestorage.app',
  messagingSenderId: '1026345346676',
  appId: '1:1026345346676:web:98478c02d3dfbae3df310e'
};
const app = initializeApp(FC);
const db = getDatabase(app);

const TAX = 0.1;

// ---- 状態変数 ----
let MENU_DATA = {};

// オプション定義
const ITEM_OPTIONS = {
  '泡盛(久米仙)': {
    type: 'required', label: '飲み方を選択してください',
    choices: ['ロック', 'ソーダ割', '水割り']
  },
  'ジャスミン焼酎(茉莉花)': {
    type: 'required', label: '飲み方を選択してください',
    choices: ['ロック', 'ソーダ割', '水割り', 'ジャスミン茶割']
  },
  '梅酒': {
    type: 'required', label: '飲み方を選択してください',
    choices: ['ロック', 'ソーダ割', '水割り']
  },
  '鶏もも肉のガパオ炒め': {
    type: 'optional', label: 'サイドメニューを追加しますか？',
    choices: [
      { label: 'ライス', price: 300 },
      { label: '目玉焼き', price: 120 }
    ]
  }
};
const taxIn = p => Math.floor(p * (1 + TAX));
const fmtY = p => '\uffe5' + p.toLocaleString();

let soldout = {};
let currentCat = 'drink';
let currentSubcat = null;
let cart = {};

// テーブル番号
const params = new URLSearchParams(window.location.search);
const tableNum = params.get('table') || '?';
document.getElementById('table-no').textContent = 'テーブル ' + tableNum;


// ---- 初期化：Firebaseからメニューと売り切れを読み込む ----
async function init() {
  try {
    const menuSnap = await get(ref(db, 'menu'));
    MENU_DATA = menuSnap.val() || {};
    if (Object.keys(MENU_DATA).length === 0) {
      document.getElementById('menu-list').innerHTML = '<div style="padding:40px;text-align:center;color:#9ca3af">メニューを読み込めませんでした</div>';
      return;
    }
    // 売り切れをリアルタイム監視
    onValue(ref(db, 'soldout'), function(snap) { soldout = snap.val() || {}; renderMenu(); });
    renderCatTabs();
    renderSubcatTabs();
    renderMenu();
    renderCart();
  } catch(e) {
    document.getElementById('menu-list').innerHTML = '<div style="padding:40px;text-align:center;color:#9ca3af">読み込みに失敗しました。再読み込みしてください。</div>';
    console.error(e);
  }
}

// 起動
init();
</script>
</body>
</html>
